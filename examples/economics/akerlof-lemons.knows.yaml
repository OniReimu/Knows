- id: stmt:m1
  statement_type: method
  modality: theoretical
  text: 'The model uses a theoretical framework with utility functions for two trader
    groups. Sellers'' utility depends on quality (known) and money; buyers'' utility
    depends on expected quality (unknown) and money. Market equilibrium is derived
    by equating supply and demand as functions of price, where supply depends on quality
    distribution conditional on sellers'' willingness to trade at a given price.

    '
  about_ref: art:paper
  status: asserted
