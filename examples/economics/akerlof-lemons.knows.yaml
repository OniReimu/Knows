abstract: 'This paper relates quality and uncertainty. The existence of goods of many
  grades poses interesting and important problems for the theory of markets. On the
  one hand, the interaction of quality differences and uncertainty may explain important
  institutions of the labor market. On the other hand, this paper presents a struggling
  attempt to give structure to the statement: Business in underdeveloped countries
  is difficult.'
