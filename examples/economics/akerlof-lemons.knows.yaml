statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Information asymmetry between buyers and sellers regarding product quality
    can lead to adverse selection, where the market disproportionately retains low-quality
    goods ("lemons"). In the extreme case, the market may collapse entirely as high-quality
    goods are driven out.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 489-492
    quote: the bad cars tend to drive out the good
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'In the used car market, sellers possess private information about the quality
    of their vehicle while buyers can only observe the average quality. Buyers therefore
    offer a price reflecting average quality, which is below the reservation price
    of high-quality sellers. This drives high-quality sellers out, lowering average
    quality further in a self-reinforcing spiral.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 489-490
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'Market institutions such as warranties, brand-name reputation, professional
    licensing, and chains (e.g., restaurant franchises) exist as counteracting mechanisms
    to information asymmetry. They serve to reduce quality uncertainty and restore
    market function by providing credible quality signals.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 499-500
    quote: there are many institutions which counteract the effects of quality uncertainty
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
