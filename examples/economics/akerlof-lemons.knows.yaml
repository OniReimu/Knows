evidence:
- id: ev:lemons-model
  evidence_type: proof
  summary: 'Section II symmetric model: With quality uniformly distributed on [0,2]
    and buyers valuing quality at 3/2 of seller valuation, the demand function D(p)
    = D(3p/2) and supply S(p) = p (average quality is p/2 when sellers of quality
    <= p offer). For any positive price p, average quality offered is p/2, so buyer
    willingness-to-pay is 3/2 * p/2 = 3p/4 < p. No trade occurs at any positive price
    — complete market collapse.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 490-491
  observations:
  - metric: equilibrium_outcome
    qualitative_value: No trade at any positive price — complete market unraveling
    qualifiers:
      model: symmetric information
      distribution: uniform [0,2]
  - metric: buyer_valuation_multiplier
    qualitative_value: Buyers value quality at 3/2 of seller valuation
    qualifiers:
      assumption: linear utility
  - metric: average_quality_offered
    qualitative_value: p/2 when all sellers with quality <= p offer their goods
    qualifiers:
      derived: from uniform distribution
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:insurance-application
  evidence_type: proof
  summary: 'Section III insurance application: As insurance premiums rise to reflect
    average risk, the lowest-risk individuals drop out (their expected cost of coverage
    exceeds their expected loss). This raises the average risk of the insured pool,
    requiring further premium increases — a death spiral analogous to the lemons mechanism
    in goods markets.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 492-495
  observations:
  - metric: adverse_selection_mechanism
    qualitative_value: Low-risk individuals exit as premiums rise, increasing average
      risk — self-reinforcing spiral
    qualifiers:
      market: insurance
  - metric: welfare_implication
    qualitative_value: 'Socially suboptimal: individuals who would benefit from insurance
      at actuarially fair rates cannot obtain it'
    qualifiers:
      type: market failure
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:institutions
  evidence_type: citation_backed
  summary: 'Section IV argues that real-world institutions serve as counteracting
    devices: (1) guarantees/warranties transfer risk from buyer to seller who has
    quality information, (2) brand names and chains provide reputational capital at
    stake, (3) professional licensing certifies minimum quality standards. These institutions
    are most prevalent in markets where quality uncertainty is highest.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 499-500
  observations:
  - metric: institution_warranty
    qualitative_value: Warranties transfer quality risk to the informed party (seller),
      reducing buyer uncertainty
  - metric: institution_reputation
    qualitative_value: Brand names and chains create reputational capital; quality
      shirking destroys long-term value
  - metric: institution_licensing
    qualitative_value: Professional licensing (e.g., medical) certifies minimum quality,
      preventing worst-case adverse selection
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:credit-markets
  evidence_type: proof
  summary: 'Section III.D applies the lemons model to credit markets in developing
    countries. Lenders face adverse selection because borrowers who accept high interest
    rates are disproportionately those with high default risk. This explains persistently
    high interest rates and credit rationing in underdeveloped economies.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 497-499
  observations:
  - metric: credit_market_effect
    qualitative_value: Higher interest rates attract riskier borrowers, creating adverse
      selection in credit markets
    qualifiers:
      context: developing countries
  - metric: policy_implication
    qualitative_value: Credit rationing is a rational response to quality uncertainty,
      not a market imperfection amenable to simple deregulation
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
