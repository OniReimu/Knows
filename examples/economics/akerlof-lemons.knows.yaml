title: 'The Market for ''Lemons'': Quality Uncertainty and the Market Mechanism'
summary: 'Agent-facing sidecar for Akerlof''s 1970 QJE paper on adverse selection.
  Covers the theoretical model of quality uncertainty in used car markets, the mechanism
  by which information asymmetry drives market collapse, and the role of institutions
  (warranties, brands, licensing) as counteracting devices. All evidence is theoretical
  (proofs, model-based reasoning).

  '
