title: Die Aetiologie, der Begriff und die Prophylaxis des Kindbettfiebers
summary: 'Dense agent-facing sidecar for Semmelweis''s work on puerperal fever (1847
  observations, published 1861). Covers the full narrative chain: clinic mortality
  differences, Kolletschka''s death as key insight, handwashing intervention with
  chlorinated lime, dramatic mortality reduction, extension of prophylaxis between
  patients, autoinfection concept, Budapest results (St. Rokus 0.85%, University
  of Pest 0.39%), medical establishment rejection, and posthumous vindication. Includes
  year-by-year mortality statistics.

  '
