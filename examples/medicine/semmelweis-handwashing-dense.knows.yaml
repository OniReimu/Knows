- id: ev:rejection-and-vindication
  evidence_type: observation
  summary: 'Semmelweis''s doctrine was initially rejected by leading European physicians
    including Virchow and Scanzoni. However, acceptance grew: Virchow acknowledged
    Semmelweis''s merit in 1864. Scanzoni conceded in 1867 that puerperal fever was
    "almost unanimously considered an infectious disease" and credited Semmelweis''s
    "restless and self-sacrificing efforts." Full vindication came after Pasteur''s
    germ theory and Lister''s antiseptic surgery in the 1860s-1870s.

    '
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part II
