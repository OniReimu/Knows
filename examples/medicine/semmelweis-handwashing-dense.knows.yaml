- id: ev:mortality-first-clinic-after
  evidence_type: observation
  summary: 'After mandatory handwashing with chlorinated lime (May 1847): June-August
    1847, mortality fell from 7.8% to 1.8%. October 1847 spike to 5.2% (12 deaths)
    traced to purulent uterine carcinoma patient. November spike to 4.0% (11 deaths)
    traced to patient with purulent knee infection. For the full year 1848, rate fell
    to 1.27% (45 deaths out of 3,556 births) — lower than the Second Division''s
    1.33%. Best individual months showed rates as low as 0.23%.

    '
