- id: stmt:l2
  statement_type: limitation
  modality: descriptive
  text: 'Germ theory had not yet been established (Pasteur''s work came in the 1860s-1870s).
    Semmelweis''s "cadaverous particles" hypothesis lacked a mechanistic microbial
    explanation, which contributed to widespread rejection by the medical establishment
    during his lifetime.

    '
  about_ref: art:paper
