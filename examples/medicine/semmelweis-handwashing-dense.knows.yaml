- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'This is an observational study, not a randomized controlled trial. There
    was no blinding, no formal control group design, and no statistical hypothesis
    testing by modern standards. Confounders beyond autopsy exposure were not systematically
    controlled.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
