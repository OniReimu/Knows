abstract: Through careful observation of mortality rates in the two maternity clinics
  at the Vienna General Hospital, and the introduction of chlorinated lime handwashing
  for physicians moving from autopsy to delivery, the mortality from puerperal fever
  in the First Division was reduced from approximately 10% to approximately 1-2%,
  matching the rates of the Second Division staffed by midwives.
