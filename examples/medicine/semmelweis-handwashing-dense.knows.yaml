- id: ev:mortality-first-clinic-before
  evidence_type: observation
  summary: 'Hospital records from 1841-1846 show the First Division (medical students)
    had a maternal mortality rate of approximately 9-10%, ranging from 5.3% to 15.8%
    across years. In 1846, the year before handwashing, the rate was approximately
    11.4% (459 deaths out of 4,010 births). The rate fluctuated around 9%, approximately
    three times higher than the Second Division.

    '
