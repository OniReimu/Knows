statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'Puerperal (childbed) fever is caused by "cadaverous particles" — decomposing
    animal organic matter transmitted on the hands of physicians and medical students
    who move directly from autopsy rooms to maternity wards without adequate hand
    cleansing. Later generalized: any source of decaying animal organic matter can
    cause the disease, not just cadaveric material.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
    quote: decaying animal-organic matter... conveyed to the individuals by the examining
      fingers
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Handwashing with chlorinated lime solution (chlorina liquida) before examining
    patients dramatically reduces maternal mortality from puerperal fever. The First
    Division mortality rate dropped from approximately 10% to under 2% after the
    intervention was introduced in May 1847. Semmelweis chose chlorine because it
    was the most effective solution for removing the characteristic cadaveric smell
    lingering on hands.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'The difference in mortality rates between the First Division (staffed by
    medical students who performed autopsies) and the Second Division (staffed by
    midwives who did not perform autopsies) is explained by medical students transmitting
    cadaverous particles on their ungloved hands. Patients were admitted to divisions
    on alternate days, creating quasi-random allocation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: empirical
  text: 'Kolletschka''s death was the key causal insight. Professor Jakob Kolletschka,
    a forensic pathologist, died in March 1847 after a student accidentally cut his
    finger during autopsy. His autopsy findings were identical to puerperal fever
    victims (lymphangitis, peritonitis, pleuritis, pericarditis, meningitis), except
    for the genital organs. Semmelweis inferred: if Kolletschka died from cadaveric
    particles entering through a wound, the same particles must cause childbed fever
    when introduced into the birth canal.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c5
  statement_type: claim
  modality: empirical
  text: 'After an October 1847 outbreak traced to a patient with a purulent uterine
    carcinoma (12 deaths, 5.2%), Semmelweis extended the handwashing requirement:
    attendants must wash with chlorine between patient examinations, not only upon
    entering the ward. A November outbreak was traced to a patient with purulent knee
    discharge, leading Semmelweis to require isolation of infected patients to prevent
    environmental contamination.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c6
  statement_type: claim
  modality: empirical
  text: 'Semmelweis identified "autoinfection" — approximately 1% of childbed fever
    cases originated from the birth canal itself (birth trauma or retained placenta)
    rather than external contamination. These cases were considered non-preventable
    by handwashing or isolation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
