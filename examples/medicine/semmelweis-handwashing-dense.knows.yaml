- id: stmt:c11
  statement_type: claim
  modality: descriptive
  text: 'Semmelweis was born July 1, 1818, in Budapest, son of a wealthy grocer. He
    enrolled at the University of Vienna to study law, switched to medicine, and
    graduated in 1844. He was appointed First Assistant (equivalent of Chief Resident)
    in Obstetrics at the First Division of the Vienna General Hospital on July 1,
    1846, at age 28.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
