- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Observational comparative study between two divisions in the same hospital.
    The First Division (medical students performing autopsies) served as the intervention
    group after handwashing was introduced in May 1847. The Second Division (midwives,
    no autopsy contact) served as the natural comparison. Mortality data were drawn
    from hospital administrative records spanning 1841-1849. Patient allocation was
    quasi-random (admission on alternate days). Semmelweis personally autopsied all
    mothers who died of childbed fever each morning before ward rounds.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:m2
  statement_type: method
  modality: descriptive
  text: 'Semmelweis used a method of systematic exclusion of putative causes. He
    examined all factors that differed between the two divisions, reasoning that
    factors present in both divisions could not explain the mortality difference.
    He eliminated causes including overcrowding, diet, atmospheric conditions, and
    even the hypothesis that embarrassment from male examination caused fever.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The primary difference between the First and Second Divisions is the autopsy
    exposure of medical students. Other potential confounders (patient demographics,
    admission patterns, overcrowding) are assumed comparable or secondary. Patients
    were assigned to divisions by day of admission (alternating schedule), providing
    quasi-random allocation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
