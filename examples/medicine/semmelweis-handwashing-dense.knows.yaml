      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c7
  statement_type: claim
  modality: empirical
  text: 'Every case of childbed fever, without exception, was caused by the introduction
    of decaying animal organic matter from outside — this was the central doctrine
    that distinguished Semmelweis from English "contagionists" who attributed fever
    to multiple causes. Semmelweis insisted on a single necessary cause.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part II
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c8
  statement_type: claim
  modality: empirical
  text: 'At St. Rokus Hospital in Budapest (1851-1857), Semmelweis achieved an overall
    maternal mortality rate from childbed fever of 0.85%, compared to 10-15% at Prague
    and Vienna during the same period. At the University of Pest, he reduced the rate
    to 0.39% in his first year as Professor (1855) and maintained 0.9% during 1859-1860.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part II
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c9
  statement_type: claim
  modality: descriptive
  text: 'Semmelweis''s findings were widely rejected during his lifetime. Major opponents
    included Rudolf Virchow (who attributed fever to inadequate uterine contractions
    and atmospheric conditions) and Friedrich Scanzoni von Lichtenfels. The main
    reason for rejection was the paradigm shift required: accepting that a disease
    could have just one necessary cause, before the discovery of bacteria and germ
    theory.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part II
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c10
  statement_type: claim
  modality: descriptive
  text: 'Semmelweis died on August 13, 1865, at age 47 in an insane asylum. Recently
    discovered autopsy documents revealed he was likely beaten by attendants while
    struggling to escape, and died of generalized sepsis from infected injuries.
    His doctrine was vindicated posthumously after Pasteur and Lister established
    the microbial basis of infection.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part II
  confidence:
    claim_strength: high
