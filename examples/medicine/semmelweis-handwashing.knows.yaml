- id: ev:mortality-first-clinic-after
  evidence_type: observation
  summary: 'After the introduction of mandatory handwashing with chlorinated lime
    in May 1847, the First Clinic mortality rate dropped dramatically. For the full
    year 1848, the rate fell to 1.27% (45 deaths out of 3,556 births). Individual
    months in late 1847 and 1848 showed rates as low as 0.23%.

    '
  source_anchors:
