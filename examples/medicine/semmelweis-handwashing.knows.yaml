statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'Puerperal (childbed) fever is caused by "cadaverous particles" — decomposing
    organic matter transmitted on the hands of physicians and medical students who
    move directly from autopsy rooms to maternity wards without adequate hand cleansing.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
    quote: decaying animal-organic matter... conveyed to the individuals by the examining
      fingers
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Handwashing with chlorinated lime solution (chlorina liquida) before examining
    patients dramatically reduces maternal mortality from puerperal fever. The First
    Clinic mortality rate dropped from approximately 10% to 1-2% after the intervention
    was introduced in May 1847.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'The difference in mortality rates between the First Clinic (staffed by medical
    students) and the Second Clinic (staffed by midwives) is explained by medical
    students'' routine contact with cadavers during anatomy instruction. Midwives
    did not perform autopsies and therefore did not transmit cadaverous particles.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Observational comparative study between two clinics in the same hospital.
    The First Clinic (medical students performing autopsies) served as the intervention
    group after handwashing was introduced in May 1847. The Second Clinic (midwives,
    no autopsy contact) served as the natural comparison. Mortality data were drawn
    from hospital administrative records spanning 1841-1849.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:monograph
    locator_type: section
    locator: Part I
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
