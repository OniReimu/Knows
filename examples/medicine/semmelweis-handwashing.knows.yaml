title: Die Aetiologie, der Begriff und die Prophylaxis des Kindbettfiebers
summary: 'Agent-facing sidecar for Semmelweis''s work on puerperal fever (1847 observations,
  published 1861). Documents his landmark finding that handwashing with chlorinated
  lime dramatically reduced maternal mortality in the First Clinic of the Vienna General
  Hospital, establishing the foundations of antiseptic practice decades before germ
  theory.

  '
