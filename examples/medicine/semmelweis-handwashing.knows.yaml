evidence:
- id: ev:mortality-first-clinic-before
  evidence_type: observation
  summary: 'Hospital records from 1841-1846 show the First Clinic (medical students)
    had a maternal mortality rate of approximately 10%, ranging from 5.3% to 15.8%
    across years. In 1846, the year before the handwashing intervention, the rate
    was approximately 11.4% (459 deaths out of 4,010 births).

    '
  source_anchors:
