abstract: This paper considers the design, fabrication, and characterization of very
  small MOSFET switching devices suitable for digital integrated circuits using dimensions
  of the order of 1 micron. Scaling relationships are presented which show how a conventional
  MOSFET can be reduced in size. An improved small device structure is presented that
  uses ion implantation to provide shallow source and drain regions and a nonuniform
  substrate doping profile. One-dimensional models are used to predict the substrate
  doping profile and the corresponding threshold voltage versus source voltage characteristic.
  A two-dimensional current transport model is used to predict the relative degree
  of short-channel effects for different device parameter combinations. Polysilicon-gate
  MOSFET's with channel lengths as short as 0.5 micron were fabricated, and the device
  characteristics measured and compared with predicted values. The performance improvement
  expected from using these very small devices in highly miniaturized integrated circuits
  is projected.
