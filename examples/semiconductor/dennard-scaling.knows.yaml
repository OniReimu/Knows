- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The paper uses a combination of analytical modeling, numerical simulation,
    and experimental verification. A one-dimensional model based on piecewise solutions
    of Poisson''s equation with a step-function doping profile predicts threshold
    voltage and substrate sensitivity for long-channel devices. A two-dimensional
    numerical current transport model (Kennedy-Mock, modified for abrupt doping profiles)
    predicts short-channel effects, computing device current point-by-point for increasing
    gate voltages. Experimental polysilicon-gate MOSFETs with channel lengths from
    0.5 to 10 microns were fabricated using a four-mask process with ion implantation,
    and their characteristics were measured and compared with predictions.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: One-Dimensional Analysis, Two-Dimensional Analysis, Fabrication
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The scaling theory assumes that carrier mobility remains approximately constant
    under scaling (the paper acknowledges a ~10% reduction due to increased impurity
    scattering in the heavier-doped substrate). It also assumes that parasitic resistance
    elements are either negligible or unchanged by scaling. The subthreshold slope
    alpha (volts per decade) does not scale because it depends on kT/q which is fixed
    at room temperature, and the paper explicitly states this is a limitation that
    must be accepted for room-temperature operation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Device Scaling, Eq. 4; Circuit Performance
    quote: the mobility is reduced slightly due to increased impurity scattering [...]
      one must accept the fact that the subthreshold behavior does not scale as desired
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'Interconnection lines do not scale favorably. Line resistance increases by
    kappa (cross-section area decreases by kappa^2, length by kappa, so R = rho*L/(W*t)
    scales as kappa). The IR voltage drop remains constant in absolute terms but is
    kappa times larger relative to the reduced operating voltages. The RC time constant
    of interconnect lines is unchanged by scaling, limiting the ability to exploit
    faster device switching for long-distance signal propagation. Current density
    in conductors increases by kappa, raising electromigration reliability concerns.
    Dennard scaling eventually broke down around 2004-2006 when voltage scaling stalled
    due to subthreshold leakage, causing power density to rise with continued dimensional
    scaling.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Circuit Performance, Table II
    quote: the resistance of a given line increases directly with the scaling factor
      kappa [...] the current density in a scaled-down conductor is increased by kappa,
      which causes a reliability concern
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
