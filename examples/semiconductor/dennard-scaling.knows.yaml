- id: ev:threshold-vs-channel-length
  evidence_type: observation
  summary: 'Two-dimensional simulations and experimental measurements show that the
    threshold voltage is essentially constant for channel lengths L > 2 microns, falls
    by a reasonably small amount as L decreases from 2 to 1 micron, and then decreases
    more rapidly with further reductions. For the basic design, L = 1.3 +/- 0.3 microns
    gives V_t = 1.0 +/- 0.1 V from chip to chip. The shortest fabricated devices had
    channel lengths of 0.5 microns. No extraneous short-channel effects were observed
    for drain voltages up to 4V at L = 1.1 microns.

    '
  source_anchors:
