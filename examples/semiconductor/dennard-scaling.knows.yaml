- id: ev:scaling-verification
  evidence_type: observation
  summary: 'Two sets of experimental devices were fabricated with gate insulators
    of 1000 angstroms and 200 angstroms (kappa=5). When the voltage and current scales
    of the smaller device were reduced by a factor of five, the drain voltage characteristics
    were quite similar to those of the larger device, confirming the scaling predictions.
    The threshold voltage also scaled correctly by a factor of five, as verified by
    the sqrt(I_d) vs V_g turn-on characteristics. An approximate 10% reduction in
    mobility was observed for devices with the heavier-doped substrate.

    '
  source_anchors:
