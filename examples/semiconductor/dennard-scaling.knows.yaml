statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Constant-field scaling: a conventional MOSFET can be systematically reduced
    in size by a dimensionless scaling factor kappa applied simultaneously to three
    variables. All linear dimensions (channel length L, channel width W, gate oxide
    thickness t_ox, junction depth) are reduced by 1/kappa; all applied voltages are
    reduced by 1/kappa; and the substrate doping concentration is increased by kappa.
    Under this transformation, the electric field distribution is preserved at every
    corresponding point in the device (E'' = V''/x'' = V/x = E), depletion layer widths
    scale as 1/kappa, and the device functions correctly at the reduced voltage levels
    because the threshold voltage also scales as V_t'' ~ V_t/kappa.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Device Scaling, pp. 256-258
    quote: all linear dimensions are reduced by a unitless scaling factor kappa [...]
      the voltages applied to the device are reduced by the same factor [...] the
      substrate doping concentration is increased, again using the same scaling factor
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Device current scales as I_d'' = I_d/kappa. Since both the gate-to-source
    overdrive voltage (V_g - V_t) and the drain voltage V_d are reduced by kappa,
    while the W/L ratio is unchanged and the oxide capacitance per unit area increases
    by kappa (thinner oxide), the net effect on the MOSFET current equation is a reduction
    by exactly kappa. The channel current per unit width is unchanged because the
    same sheet density of carriers moves at the same velocity (electric field is preserved).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Device Scaling, Eq. 3
    quote: the device current [...] is seen to be reduced by a factor of kappa, for
      any given set of applied voltages, assuming no change in mobility
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'Circuit-level scaling consequences: capacitances scale as 1/kappa (area reduced
    by kappa^2, spacing reduced by kappa, so C = epsilon*A/t scales as 1/kappa). Delay
    time per circuit scales as 1/kappa (proportional to VC/I = (V/kappa)(C/kappa)/(I/kappa)
    = delay/kappa). Power dissipation per circuit scales as 1/kappa^2 (V*I both reduced
    by kappa). The power-delay product improves by kappa^3. Crucially, power density
    (power per unit area) remains constant at 1, because power drops as 1/kappa^2
    and circuit area drops as 1/kappa^2. This means more circuits can be packed on
    a chip without worsening the cooling problem.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Circuit Performance, Table I
    quote: the power density remains constant [...] even if many more circuits are
      placed on a given integrated circuit chip, the cooling problem is essentially
      unchanged
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: empirical
  text: 'Ion implantation enables an improved scaled-down MOSFET design that relaxes
    the stringent gate oxide thickness requirement. By implanting a controlled boron
    surface layer (step-profile doping) into a lightly doped substrate, the substrate
    sensitivity (threshold voltage variation with source-to-substrate bias) is reduced.
    This allows using a 350-angstrom gate insulator instead of the 200-angstrom insulator
    required by direct scaling (kappa=5), while maintaining adequate threshold control.
    The shallow ion-implanted source/drain regions (~2000 angstrom depth) also reduce
    short-channel effects and inter-electrode capacitances compared to conventional
    diffused junctions.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Ion-Implanted Device Design, pp. 258-259
    quote: the gate insulator thickness can be increased to as much as 350 angstroms
      and still maintain a reasonable gate threshold voltage
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c5
  statement_type: claim
  modality: empirical
  text: 'A zero-substrate-bias design variant using a shallower boron implant offers
    improved threshold control for short-channel devices. Two-dimensional simulations
    show that the threshold voltage for an L=0.8 micron device with zero substrate
    bias is comparable to that of an L=1.0 micron device with the basic -1V substrate
    bias design. However, this improvement comes at the cost of a slower subthreshold
    turn-on characteristic (wider subthreshold swing), making it less suitable for
    dynamic memory applications where low off-state leakage is critical.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Zero Substrate Bias Design, pp. 261-262
    quote: the threshold for this case for a device with L=0.8 micron is about the
      same as for an L=1.0 micron device of the basic design
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
