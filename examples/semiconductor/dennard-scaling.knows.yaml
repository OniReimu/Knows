title: Design of Ion-Implanted MOSFET's with Very Small Physical Dimensions
summary: 'Agent-facing sidecar for Dennard et al.''s 1974 paper in IEEE JSSC, which
  establishes the constant-field scaling theory for MOSFET transistors. The paper
  shows that all linear dimensions, voltages, and currents of a MOSFET can be scaled
  down by a dimensionless factor kappa while increasing substrate doping by the same
  factor, preserving the electric field distribution and keeping power density constant.
  This framework, known as Dennard scaling, complemented Moore''s Law by providing
  the physical basis for simultaneously improving transistor speed and density without
  increasing power dissipation. The paper also demonstrates an improved ion-implanted
  device structure with a 350-angstrom gate insulator and shallow source/drain regions,
  achieving channel lengths as short as 0.5 micron. Two-dimensional simulations and
  experimental measurements validate the scaling predictions.

  '
