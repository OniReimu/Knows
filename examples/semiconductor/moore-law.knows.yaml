  summary: 'Moore presents a log-linear plot (Figure 1) of the number of components
    on the most economical integrated circuit from 1959 to 1965. The data points show
    exponential growth from a single transistor in 1959 to approximately 50-60 components
    per chip in 1965, consistent with a doubling period of approximately one year.
    This constitutes 6 data points spanning 6 years of the nascent IC industry.

    '
