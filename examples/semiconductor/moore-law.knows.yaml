title: Cramming more components onto integrated circuits
summary: 'Agent-facing sidecar for Gordon Moore''s 1965 paper in Electronics Magazine,
  which observed that the number of transistors on an integrated circuit had been
  doubling approximately every year since 1959 and predicted this trend would continue
  for at least a decade. This empirical observation, later refined to a doubling every
  two years (and popularly quoted as 18 months), became known as Moore''s Law. The
  paper also argues that increasing integration reduces cost per component, identifies
  an optimal component count per chip at any technology generation, and projects 65,000
  components on a single chip by 1975. Evidence is observational and extrapolative
  — no theoretical derivation or physical law is claimed.

  '
