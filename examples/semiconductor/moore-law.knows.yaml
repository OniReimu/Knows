- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'By 1975, it would be possible to have as many as 65,000 components on a single
    silicon chip. This prediction was extrapolated from the 1959-1965 data trend of
    annual doubling: starting from approximately 50 components in 1965, ten more doublings
    by 1975 would yield 2^10 * 50 ~ 65,000 components. This prediction proved remarkably
    accurate — the Intel 8080 (1974) had ~4,500 transistors, the 8085 (1976) had ~6,500,
    and the 16-bit processors of the late 1970s approached the predicted range.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
