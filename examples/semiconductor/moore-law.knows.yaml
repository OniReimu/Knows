- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The extrapolation assumes that the manufacturing improvements driving the
    doubling trend — advances in photolithography, increases in wafer diameter, reductions
    in defect density, and innovations in circuit design techniques — will continue
    at their historical rate for at least the next decade (1965-1975). Moore does
    not claim any physical necessity for this; it is an assumption about the pace
    of engineering progress and economic investment in semiconductor R&D.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
