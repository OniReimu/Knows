- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'Increasing integration reduces the manufacturing cost per component. At any
    given time there exists an optimal number of components per chip that minimizes
    the cost per component — too few components underutilize the silicon area, while
    too many decrease yield due to defect density. As manufacturing technology improves
    (higher yield, finer lithography), this optimum shifts to higher component counts.
    The economic driving force of integration is therefore cost reduction, not merely
    technical achievement.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
