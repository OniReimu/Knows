- id: stmt:c4
  statement_type: claim
  modality: empirical
  text: 'Integrated electronics will lead to practical home computers, automatic controls
    for automobiles, and personal portable communications equipment. Moore envisions
    that the economics of integration will make complex electronic systems available
    to ordinary consumers, fundamentally transforming electronics from a specialist
    industrial tool to a consumer commodity.

    '
