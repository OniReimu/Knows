- id: ev:cost-per-component
  evidence_type: observation
  summary: 'Moore presents a cost analysis showing that the cost per component decreases
    as the number of components per chip increases, up to an optimum point beyond
    which yield losses from manufacturing defects cause costs to rise again. This
    optimum shifts to higher component counts each year as manufacturing processes
    improve. The curve of cost per component versus number of components has a U-shape,
    with the minimum moving rightward over time.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: p. 115, Figure 2
