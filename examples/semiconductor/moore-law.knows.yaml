- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'Moore''s Law is an empirical observation and economic prediction, not a physical
    law. It has no theoretical derivation and must eventually encounter fundamental
    physical limits: atomic scale (transistor feature sizes approaching atomic dimensions),
    quantum tunneling (leakage current increasing exponentially as gate oxide thins),
    and thermodynamic limits (Landauer''s principle sets minimum energy per bit erasure
    at kT*ln(2)). Dennard scaling broke down around 2006 (power density no longer
    decreased with smaller transistors), and the doubling period has progressively
    lengthened since approximately 2012. Moore himself acknowledged the trend cannot
    continue indefinitely.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
