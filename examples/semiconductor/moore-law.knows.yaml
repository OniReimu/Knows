- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Moore''s methodology is empirical observation and log-linear extrapolation
    from manufacturing data. He plots the number of components on the most cost-effective
    integrated circuits from 1959 to 1965 on a semi-logarithmic scale and observes
    a straight line (exponential growth). The extrapolation to 1975 assumes this trend
    continues at the same rate. No physical or theoretical model is proposed to explain
    the doubling — it is presented as an empirical regularity driven by concurrent
    improvements in lithographic resolution, wafer size, defect density reduction,
    and circuit design cleverness.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: pp. 114-115, Figure 1
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
