statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'The number of transistors (components) on an integrated circuit doubles approximately
    every year. Moore observed that the most cost-effective number of components per
    chip had grown from 1 (1959) to roughly 50-60 (1965), following an exponential
    trend. He projected this doubling rate would continue for at least a decade. In
    1975, Moore revised the doubling period to approximately every two years, and
    the popular formulation settled on 18 months (combining Moore''s transistor density
    observation with Dennard scaling improvements in clock speed).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: pp. 114-117
    quote: The complexity for minimum component costs has increased at a rate of roughly
      a factor of two per year
  confidence:
