- id: ev:1975-prediction
  evidence_type: observation
  summary: 'Extrapolating the observed doubling trend from 1965 to 1975 (ten more
    doublings), Moore predicts 65,000 components per chip by 1975. This prediction
    was approximately validated by actual industry development: the 16K DRAM (16,384
    transistors) appeared in 1976, and the Intel 8086 (29,000 transistors) in 1978.
    Moore''s 1975 revision adjusted the doubling rate to every two years for the post-1975
    era.

    '
  source_anchors:
