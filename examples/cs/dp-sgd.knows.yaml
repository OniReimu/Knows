- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Deep neural networks can be trained with meaningful differential privacy
    guarantees (single-digit epsilon) at a modest cost in accuracy. On MNIST, 90%
    accuracy at (0.5, 10^-5)-DP, 95% at (2, 10^-5)-DP, and 97% at (8, 10^-5)-DP.

    '
