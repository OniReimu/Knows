summary: 'Agent-facing sidecar for the DP-SGD paper (Abadi et al., CCS 2016). Covers
  the differentially private SGD algorithm, moments accountant for tighter privacy
  bounds, and experimental results on MNIST (97% at epsilon=0.5) and CIFAR-10 (67-73%
  at epsilon=2-8).

  '
