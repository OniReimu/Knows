statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'The moments accountant provides a tighter bound on the privacy loss of differentially
    private SGD compared to the strong composition theorem. It saves a sqrt(log(1/delta))
    factor in epsilon and a T*q factor in delta.

    '
