- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'On CIFAR-10 with convolutional layers, differentially private training achieves
    67%, 70%, and 73% accuracy at epsilon values of 2, 4, and 8 respectively (delta
    = 10^-5). The accuracy gap compared to non-private training (~80%) is about 7-13%.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
