- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Differentially private SGD (Algorithm 1) consists of three steps per iteration:
    (1) compute per-example gradients, (2) clip each gradient to bound L2 norm by
    threshold C, (3) add calibrated Gaussian noise N(0, sigma^2 * C^2 * I) to the
    average gradient. The moments accountant tracks cumulative privacy cost.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: '3'
