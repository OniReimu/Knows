abstract: Machine learning techniques based on neural networks are achieving remarkable
  results in a wide variety of domains. Often, the training of models requires large,
  representative datasets, which may be crowdsourced and contain sensitive information.
  The models should not expose private information in these datasets. We combine state-of-the-art
  machine learning methods with advanced privacy-preserving mechanisms, training neural
  networks within a modest privacy budget. We develop new algorithmic techniques,
  a refined analysis of privacy costs within the framework of differential privacy,
  and careful implementation strategies.
