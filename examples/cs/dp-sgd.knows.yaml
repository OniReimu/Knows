- id: ev:theorem1
  evidence_type: proof
  summary: 'Theorem 1: Algorithm 1 is (epsilon, delta)-differentially private for
    any epsilon < c1 * q^2 * T if sigma >= c2 * q * sqrt(T * log(1/delta)) / epsilon,
    where q = L/N is the sampling ratio and T is the number of steps. The moments
    accountant achieves this tighter bound.

    '
  source_anchors:
