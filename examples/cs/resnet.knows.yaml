  statement_type: claim
  modality: empirical
  text: 'Deeper plain networks suffer from a degradation problem where increased depth
    leads to higher training error, not caused by overfitting. Residual learning with
    identity shortcut connections addresses this degradation and enables accuracy
    gains from considerably increased depth.

    '
