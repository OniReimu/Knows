- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The residual learning framework reformulates layers as learning residual
    functions F(x) = H(x) - x with reference to the layer input, rather than learning
    unreferenced functions H(x). The original mapping becomes F(x) + x, realized by
    shortcut connections that perform identity mapping.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 2-3
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: theoretical
  text: 'If identity mappings are optimal, it is easier to push the residual to zero
    than to fit an identity mapping with a stack of nonlinear layers. This hypothesis
    motivates the residual learning formulation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
