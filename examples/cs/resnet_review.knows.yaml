- id: stmt:w2
  statement_type: limitation
  modality: normative
  text: 'The 1202-layer CIFAR-10 result (7.93%) is worse than the 110-layer version
    (6.43%), attributed to overfitting. No regularization techniques are explored,
    leaving open whether the degradation problem is truly solved or merely deferred
    to extreme depths.

    '
