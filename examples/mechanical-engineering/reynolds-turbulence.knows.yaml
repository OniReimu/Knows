- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The critical Reynolds number of approximately 2300 represents the lower bound
    for natural transition; with extreme care to minimize disturbances, laminar flow
    can be maintained to Re values of 10,000 or higher. The transition is therefore
    not a sharp threshold but depends on the level of ambient disturbances, inlet
    conditions, and surface roughness. The 1.7-power resistance law for turbulent
    flow is empirical and has since been refined by later investigators.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
