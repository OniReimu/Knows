statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'The transition from laminar (direct) to turbulent (sinuous) flow in a pipe
    occurs at a critical value of the dimensionless ratio Re = rho * v * D / mu, where
    rho is the fluid density, v is the mean velocity, D is the pipe diameter, and
    mu is the dynamic viscosity. This single dimensionless group governs the flow
    regime regardless of the individual values of its constituent variables.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 935-942
    quote: the general character of the motion of fluids... depends on the relation
      between... the velocity, the density, the viscosity, and the dimensions
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'The critical Reynolds number for the transition from laminar to turbulent
    flow in pipe flow is approximately 2300. Below this value, dye streaks remain
    coherent and straight (laminar flow); above it, dye rapidly mixes and disperses
    throughout the cross-section (turbulent flow). The transition is reproducible
    across different tube diameters and flow velocities when expressed in terms of
    Re.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 942-950
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'Two distinct flow regimes exhibit different resistance laws: in laminar flow
    (below the critical velocity), the resistance is proportional to the first power
    of velocity (consistent with Poiseuille''s law); in turbulent flow (above the
    critical velocity), the resistance is proportional to approximately the 1.7th
    power of velocity.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 955-970
    quote: the resistance... varies as the first power of the velocity when the velocity
      is below the critical value, and approximately as the 1.7 power when above
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Dye injection experiments in glass tubes: a thin stream of coloured dye is
    introduced into the centre of a flow of water through horizontal glass tubes.
    The apparatus uses a large tank to ensure uniform head, tubes of three different
    diameters (approximately 1/4, 1/2, and 1 inch), and careful temperature control
    to vary viscosity. The critical velocity is determined by observing the velocity
    at which the dye streak transitions from a steady filament to chaotic mixing.
    Pressure drop measurements along the tube provide quantitative resistance data.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 935-942
  confidence:
