abstract: The results of an investigation into the circumstances which determine whether
  the motion of water shall be direct or sinuous, and of the law of resistance in
  parallel channels. It was found that the critical velocity at which the motion changes
  from one to the other depends on the relation between the velocity, the diameter
  of the tube, and the viscosity of the fluid.
