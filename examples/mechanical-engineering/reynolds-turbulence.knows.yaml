evidence:
- id: ev:dye-visualisation
  evidence_type: experiment_run
  summary: 'Dye injection experiments across three tube diameters (approximately 6.35
    mm, 12.7 mm, and 25.4 mm). At low velocities, the dye streak remains a coherent,
    straight filament running along the centre of the tube (laminar flow). Upon exceeding
    the critical velocity, the dye streak breaks up abruptly and mixes throughout
    the cross-section (turbulent flow). The critical velocity scales inversely with
    tube diameter, confirming the dimensionless grouping.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 940-950
  observations:
  - metric: critical_reynolds_number
    value: 2300
    qualifiers:
      condition: natural transition, moderate disturbance level
      note: approximate lower critical Re
  - metric: tube_diameter_1
    value: 6.35
    unit: mm
    qualifiers:
      nominal: 1/4 inch
  - metric: tube_diameter_2
    value: 12.7
    unit: mm
    qualifiers:
      nominal: 1/2 inch
  - metric: tube_diameter_3
    value: 25.4
    unit: mm
    qualifiers:
      nominal: 1 inch
  - metric: dye_behaviour_below_critical
    qualitative_value: Coherent straight filament along tube centreline; no mixing
  - metric: dye_behaviour_above_critical
    qualitative_value: Abrupt breakup and rapid mixing across entire cross-section
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:resistance-measurements
  evidence_type: experiment_run
  summary: 'Pressure drop measurements along the glass tubes demonstrate two distinct
    resistance regimes. Below the critical velocity, pressure drop is linear in velocity
    (Poiseuille/Hagen regime). Above the critical velocity, pressure drop increases
    approximately as v^1.7. The transition between regimes occurs at a consistent
    dimensionless velocity ratio across different tube sizes.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 955-970
  observations:
  - metric: laminar_resistance_exponent
    value: 1.0
    qualifiers:
      regime: laminar (below critical Re)
      law: Poiseuille
  - metric: turbulent_resistance_exponent
    value: 1.7
    qualifiers:
      regime: turbulent (above critical Re)
      note: empirical fit
  - metric: regime_consistency
    qualitative_value: Transition occurs at the same Re value regardless of tube diameter
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:temperature-variation
  evidence_type: experiment_run
  summary: 'By varying water temperature (and hence viscosity), Reynolds demonstrated
    that the critical velocity shifts in exact proportion to the kinematic viscosity,
    confirming that the dimensionless group rho*v*D/mu (not velocity alone) governs
    the transition. Experiments at temperatures ranging from approximately 5 C to
    22 C yielded consistent critical Re values.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 948-955
  observations:
  - metric: temperature_range_low
    value: 5
    unit: degrees_celsius
    qualifiers:
      note: higher viscosity, lower critical velocity
  - metric: temperature_range_high
    value: 22
    unit: degrees_celsius
    qualifiers:
      note: lower viscosity, higher critical velocity
  - metric: Re_consistency_across_temperatures
    qualitative_value: Critical Re remains approximately 2300 regardless of temperature
      when viscosity variation is accounted for
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:upper-critical-re
  evidence_type: experiment_run
  summary: 'Under carefully controlled conditions with minimized inlet disturbances,
    Reynolds observed that laminar flow could be maintained well above Re = 2300,
    reaching values up to approximately 13,000 before transition. This demonstrates
    that the lower critical Re (~2300) is the value below which turbulence always
    decays, while the upper critical Re depends on disturbance amplitude.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 960-968
  observations:
  - metric: lower_critical_re
    value: 2300
    qualifiers:
      condition: below this, all disturbances decay
  - metric: upper_critical_re_observed
    value: 13000
    qualifiers:
      condition: very careful disturbance suppression
      note: approximate
  provenance:
    origin: author
    actor:
