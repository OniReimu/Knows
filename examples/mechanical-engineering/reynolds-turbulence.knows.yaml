subject_ref: art:paper
title: An Experimental Investigation of the Circumstances Which Determine Whether
  the Motion of Water Shall Be Direct or Sinuous
summary: 'Agent-facing sidecar for Reynolds'' 1883 paper in the Philosophical Transactions
  of the Royal Society. Introduces the dimensionless ratio (now called Reynolds number
  Re = rho*v*D/mu) governing the transition between laminar ("direct") and turbulent
  ("sinuous") flow in pipes. Evidence is entirely experimental: dye injection visualization
  in glass tubes with systematic variation of velocity, tube diameter, and fluid temperature
  (viscosity).

  '
