- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The core results assume a stationary ergodic source (statistical properties
    do not change over time and ensemble averages equal time averages) and, for the
    basic channel capacity formula, a discrete memoryless channel (each transmitted
    symbol is corrupted independently of other symbols according to a fixed conditional
    probability distribution). These assumptions are relaxed in later sections for
    continuous sources and channels with memory, but the fundamental theorems are
    proved under these idealized conditions.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Section 4; Part III, Section 16
  confidence:
