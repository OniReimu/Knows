statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Information can be quantified using entropy: H(X) = -sum_x p(x) log p(x),
    measured in bits when using logarithm base 2. This quantity represents the average
    uncertainty or information content of a random variable X. Entropy is maximized
    when all outcomes are equally likely (uniform distribution) and equals zero only
    when the outcome is certain. The logarithmic measure is the unique function (up
    to a constant) satisfying three natural axioms: continuity, monotonicity for uniform
    distributions, and composition (grouping property).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Section 6
    quote: H = -sum p_i log p_i
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'The channel capacity C = max_{p(x)} I(X;Y) defines the fundamental upper
    limit on the rate of reliable communication through a noisy channel. Here I(X;Y)
    = H(X) - H(X|Y) = H(Y) - H(Y|X) is the mutual information between the input X
    and output Y. For the binary symmetric channel with crossover probability p, C
    = 1 - H(p) = 1 + p*log(p) + (1-p)*log(1-p) bits per channel use. For a continuous
    channel with bandwidth W and signal-to-noise ratio S/N, C = W * log_2(1 + S/N).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part III, Section 16
    quote: the capacity of a noisy channel
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The noisy channel coding theorem (Shannon''s second theorem): for any communication
    rate R < C, there exists a coding scheme such that the probability of decoding
    error can be made arbitrarily small. Conversely, for R > C, the error probability
    is bounded away from zero regardless of the coding scheme used. This is an existence
    proof — Shannon shows that random codes achieve capacity with high probability
    but does not provide explicit constructive coding schemes.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part III, Theorems 11-12
    quote: it is possible to send information at the rate C through the channel with
      as small a frequency of errors... as desired
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'The noiseless source coding theorem (Shannon''s first theorem): a discrete
    memoryless source with entropy H can be encoded with an average of H bits per
    symbol, and no lossless encoding can achieve fewer than H bits per symbol on average.
    This establishes entropy as the fundamental compression limit and provides the
    theoretical basis for all data compression algorithms.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Theorem 3
  confidence:
    claim_strength: high
