abstract: The recent development of various methods of modulation such as PCM and
  PPM which exchange bandwidth for signal-to-noise ratio has intensified the interest
  in a general theory of communication. A basis for such a theory is contained in
  the important papers of Nyquist and Hartley. In the present paper we will extend
  the theory to include a number of new factors, in particular the effect of noise
  in the channel.
