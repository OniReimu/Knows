title: A Mathematical Theory of Communication
summary: 'Agent-facing sidecar for Shannon''s 1948 landmark paper founding information
  theory. Covers the definition of information entropy H = -sum p(x) log p(x), the
  channel capacity theorem C = max I(X;Y), and the noisy channel coding theorem proving
  reliable communication is achievable at any rate below capacity. The paper establishes
  a complete mathematical framework using probability theory and logarithmic measures,
  under assumptions of stationary ergodic sources and memoryless channels for the
  core results. Evidence is entirely proof-based — constructive coding schemes are
  not provided.

  '
