    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Shannon employs a mathematical framework combining probability theory, stochastic
    processes (Markov chains and ergodic theory), and logarithmic information measures.
    The communication system is modeled as a chain: source -> encoder -> channel ->
    decoder -> destination. The key methodological innovation is treating messages
    as random variables drawn from a probability distribution, abstracting away semantic
    content to focus on the statistical structure of communication. Random coding
    arguments (selecting codewords randomly) are used to prove the achievability of
    channel capacity.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Section 1; Part III, Section 16
  confidence:
