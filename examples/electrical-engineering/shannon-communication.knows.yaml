- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The noisy channel coding theorem is a pure existence proof obtained via random
    coding arguments. Shannon demonstrates that capacity- achieving codes exist but
    provides no constructive method for designing them. Practical capacity-approaching
    codes (turbo codes, LDPC codes, polar codes) were not developed until decades
    later (1993, 1960/2001, 2008 respectively). Additionally, the separation theorem
    (separate source and channel coding is optimal) holds asymptotically but can be
    suboptimal for finite block lengths or delay-constrained systems.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
