- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'The noiseless source coding theorem (Shannon''s first theorem, Theorem 3):
    a discrete memoryless source with entropy H can be encoded with an average of H
    bits per symbol, and no lossless encoding can achieve fewer than H bits per symbol.
    This establishes entropy as the fundamental compression limit and provides the
    theoretical basis for all data compression algorithms.

    '
  about_ref: art:paper
  status: asserted
