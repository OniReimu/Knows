- id: ev:channel-coding-proof
  evidence_type: proof
  summary: 'Shannon proves the noisy channel coding theorem (Theorems 11-12) using
    random coding. For a discrete memoryless channel with capacity C, he constructs
    a random codebook of 2^(nR) codewords of length n. Using AEP and joint typicality
    decoding, the average error probability goes to zero as n -> infinity for R < C.
    The converse (Fano''s inequality): for R > C, error probability is bounded away
    from zero.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part III, Theorems 11-12
  observations:
  - metric: achievability
    qualitative_value: For R < C, codes exist with P_error -> 0 as block length n
      -> infinity
    qualifiers:
      method: random coding argument
  - metric: converse
    qualitative_value: For R > C, P_error bounded away from zero for all codes
    qualifiers:
      method: Fano's inequality
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
