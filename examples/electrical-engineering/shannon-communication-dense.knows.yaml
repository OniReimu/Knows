- id: stmt:c5
  statement_type: claim
  modality: theoretical
  text: 'The five-component communication system model consists of: (1) an information
    source producing messages; (2) a transmitter encoding messages into signals; (3)
    the channel, the medium for signal transmission; (4) a receiver performing the
    inverse of the transmitter to reconstruct the message; (5) the destination, the
    person or thing for whom the message is intended. This model abstracts away
    semantic content to focus on the statistical structure of communication.

    '
