- id: ev:entropy-properties
  evidence_type: proof
  summary: 'Six properties of entropy proved in Section 6: (1) H=0 iff one p_i=1;
    (2) max H = log(n) for uniform; (3) H(x,y) <= H(x)+H(y); (4) equalization
    increases H; (5) chain rule H(x,y) = H(x) + H_x(y); (6) conditioning reduces
    entropy H(y) >= H_x(y). The form is recognized as Boltzmann entropy from
    statistical mechanics.

    '
  source_anchors:
