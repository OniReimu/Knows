- id: ev:entropy-uniqueness
  evidence_type: proof
  summary: 'Shannon proves (Theorem 2) that H = -K sum p_i log p_i is the unique
    measure satisfying three axioms: (1) continuity in p_i; (2) monotonically increasing
    in n for equiprobable outcomes; (3) composition/grouping law. Example: H(1/2,
    1/3, 1/6) = H(1/2, 1/2) + 1/2 * H(2/3, 1/3). Maximum entropy is log(n) for
    uniform distribution.

    '
