    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The noisy channel coding theorem (Shannon''s second theorem): for any communication
    rate R < C, there exists a coding scheme such that the probability of decoding
    error can be made arbitrarily small as block length increases. Conversely, for
    R > C, the error probability is bounded away from zero regardless of the coding
    scheme. This is an existence proof via random coding — Shannon shows random codes
    achieve capacity with high probability but does not provide explicit constructive
    coding schemes.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part III, Theorems 11-12
    quote: it is possible to send information at the rate C through the channel with
      as small a frequency of errors... as desired
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
