- id: stmt:c11
  statement_type: claim
  modality: theoretical
  text: 'The discrete noiseless channel capacity C = lim_{T->inf} log N(T) / T, where
    N(T) is the number of allowed signals of duration T. For the telegraphy case
    with constraints on allowed sequences, C can be computed from the characteristic
    equation of a difference equation. Shannon derives the telegraphy channel
    capacity as C = 0.539 bits per symbol time.

    '
