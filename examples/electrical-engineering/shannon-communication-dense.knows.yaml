- id: stmt:c6
  statement_type: claim
  modality: theoretical
  text: 'The redundancy of ordinary English is roughly 50%, considering statistical
    structure over distances of about eight letters. This means half of what we write
    is determined by the structure of the language and half is chosen freely. Shannon
    verified this figure by calculating entropy of successive approximations to English,
    deletion/restoration experiments, and results from cryptography.

    '
