statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Information can be quantified using entropy: H(X) = -sum_x p(x) log p(x),
    measured in bits when using logarithm base 2. This quantity represents the average
    uncertainty or information content of a random variable X. Entropy is maximized
    when all outcomes are equally likely (uniform distribution), yielding H = log(n),
    and equals zero only when the outcome is certain. The logarithmic measure is the
    unique function (up to a positive constant K) satisfying three axioms: (1) H is
    continuous in the p_i; (2) for equiprobable outcomes H is monotonically increasing
    in n; (3) the composition/grouping property.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Section 6, Theorem 2
    quote: H = -K sum p_i log p_i
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'The channel capacity C = max_{p(x)} I(X;Y) defines the fundamental upper
    limit on the rate of reliable communication through a noisy channel. Here I(X;Y)
    = H(X) - H(X|Y) = H(Y) - H(Y|X) is the mutual information between input X and
    output Y. For the binary symmetric channel with crossover probability p, C = 1
    - H(p) = 1 + p*log(p) + (1-p)*log(1-p) bits per channel use. For a continuous
    channel with bandwidth W and signal-to-noise ratio S/N, C = W * log_2(1 + S/N)
    bits per second (the Shannon-Hartley theorem).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part III, Section 16; Part IV, Section 24
    quote: the capacity of a noisy channel
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
