- id: stmt:c10
  statement_type: claim
  modality: theoretical
  text: 'Entropy has six key properties: (1) H=0 iff outcome is certain; (2) H is
    maximized at log(n) for uniform distribution; (3) H(x,y) <= H(x)+H(y) with
    equality iff x,y independent; (4) equalization of probabilities increases H; (5)
    H(x,y) = H(x) + H_x(y) where H_x(y) is conditional entropy; (6) H(y) >= H_x(y)
    — knowledge never increases uncertainty. The form H = -sum p_i log p_i is
    recognized as Boltzmann entropy from statistical mechanics.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Part I, Section 6
  confidence:
