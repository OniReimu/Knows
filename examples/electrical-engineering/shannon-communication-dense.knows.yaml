- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Shannon employs a mathematical framework combining probability theory,
    stochastic processes (Markov chains, ergodic theory), and logarithmic information
    measures. The key methodological innovation is treating messages as random variables
    drawn from probability distributions, abstracting away semantic content. The
    communication system is modeled as a chain: source -> encoder -> channel -> decoder
    -> destination (Fig. 1). Random coding arguments (selecting codewords randomly)
    prove achievability of channel capacity. The asymptotic equipartition property
    (AEP) and joint typicality decoding are used for the channel coding theorem.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
