- id: stmt:c7
  statement_type: claim
  modality: descriptive
  text: 'The unit "bit" (binary digit) was suggested by J. W. Tukey. Using base-2
    logarithm, one bit is the information content of a choice between two equally
    likely alternatives. A device with two stable positions (relay, flip-flop) stores
    one bit. N such devices store N bits, since total states = 2^N and log_2(2^N) =
    N. Base-10 gives decimal digits (1 decimal digit = 3.32 bits). Base-e gives
    natural units.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
