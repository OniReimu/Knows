summary: 'Agent-facing sidecar for Terzaghi''s foundational works on soil mechanics:
  "Erdbaumechanik auf bodenphysikalischer Grundlage" (1925) and "Theoretical Soil
  Mechanics" (1943). Covers the effective stress principle, one-dimensional consolidation
  theory, and oedometer-based experimental validation. Evidence is a mix of laboratory
  experiment results and mathematical derivations.

  '
