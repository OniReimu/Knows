abstract: This work establishes the fundamental principles of soil mechanics based
  on soil physics, introducing the concept of effective stress and the theory of one-dimensional
  consolidation. Laboratory oedometer tests demonstrate that consolidation of saturated
  clay follows a time-dependent process governed by the coefficient of consolidation.
