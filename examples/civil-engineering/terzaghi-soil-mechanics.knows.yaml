evidence:
- id: ev:oedometer
  evidence_type: experiment_run
  summary: 'Laboratory oedometer tests on saturated clay specimens demonstrate that
    settlement proceeds as a time-dependent process consistent with the theoretical
    consolidation curve. Measured c_v values for typical clays range from 0.5 to 30
    m^2/year depending on soil type and stress level. The log-time method and square-root-of-time
    method both yield consistent c_v values.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 275-290
  observations:
  - metric: coefficient_of_consolidation_c_v
    value: 0.5
    unit: m^2/year
    qualifiers:
      soil_type: soft marine clay
      condition: lower bound typical
  - metric: coefficient_of_consolidation_c_v
    value: 30
    unit: m^2/year
    qualifiers:
      soil_type: stiff overconsolidated clay
      condition: upper bound typical
  - metric: compression_index_C_c
    value: 0.4
    qualifiers:
      soil_type: normally consolidated clay
      note: typical range 0.2-0.8
  - metric: time_for_90pct_consolidation
    qualitative_value: Minutes to hours in laboratory oedometer; months to years in
      field
    qualifiers:
      note: depends on drainage path length squared
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:consolidation-derivation
  evidence_type: proof
  summary: 'Mathematical derivation of the one-dimensional consolidation equation
    from first principles: continuity equation for pore water flow, Darcy''s law for
    seepage velocity, and a linear stress-strain relationship for the soil skeleton.
    The resulting PDE (du/dt = c_v * d^2u/dz^2) has an analytical Fourier series solution
    for standard boundary conditions, yielding the theoretical U-T_v curve that relates
    degree of consolidation to dimensionless time factor.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 265-280
  observations:
  - metric: time_factor_at_50pct_consolidation
    value: 0.197
    qualifiers:
      U: 50%
      boundary: double drainage
  - metric: time_factor_at_90pct_consolidation
    value: 0.848
    qualifiers:
      U: 90%
      boundary: double drainage
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:effective-stress-validation
  evidence_type: experiment_run
  summary: 'Direct shear and triaxial tests on saturated soils demonstrate that shear
    strength and volume change behaviour correlate with effective stress (sigma -
    u) rather than total stress. Specimens tested at identical effective stress but
    different total stress and pore pressure combinations yield the same shear strength
    and deformation behaviour, confirming the effective stress principle.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 11-20
  observations:
  - metric: effective_stress_principle
    qualitative_value: Shear strength is a unique function of effective stress sigma'
      = sigma - u
    qualifiers:
      test_type: direct shear and triaxial
  - metric: pore_pressure_independence
    qualitative_value: Same sigma' with different (sigma, u) combinations produces
      identical strength and deformation
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
