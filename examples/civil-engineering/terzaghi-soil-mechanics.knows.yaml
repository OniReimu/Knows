statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'The mechanical behaviour of soils is governed by the principle of effective
    stress: sigma'' = sigma - u, where sigma'' is the effective stress carried by
    the soil skeleton, sigma is the total stress, and u is the pore water pressure.
    Only changes in effective stress cause changes in volume or shear strength of
    the soil.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 11-15
    quote: All measurable effects of a change of stress... are exclusively due to
      changes in the effective stresses
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Consolidation of a saturated clay layer under an applied load is a time-dependent
    process governed by the one-dimensional consolidation equation: du/dt = c_v *
    d^2u/dz^2, where u is excess pore water pressure, c_v is the coefficient of consolidation,
    and z is the depth coordinate. This equation is analogous to the heat diffusion
    equation.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 265-280
    quote: the process of consolidation involves a gradual transfer of stress from
      the pore water to the soil skeleton
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'The degree of consolidation U as a function of time factor T_v follows a
    predictable curve derivable from the consolidation equation. For U < 60%, the
    relation approximates T_v = (pi/4) * U^2; for U > 60%, T_v = -0.9332 * log10(1
    - U) - 0.0851. Laboratory oedometer tests confirm this theoretical prediction.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 280-290
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The consolidation theory is validated through oedometer (one-dimensional
    compression) tests on saturated clay specimens. A soil sample is confined in a
    rigid ring, loaded incrementally, and the settlement is recorded as a function
    of time. The coefficient of consolidation c_v is back-calculated by fitting the
    theoretical U-T_v curve to the measured settlement-time data (square root of time
    or log-time method).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 265-275
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The soil is treated as a two-phase medium consisting of incompressible solid
    grains and incompressible pore water. The soil is fully saturated. Water flow
    through the soil obeys Darcy''s law (v = k * i, where k is the coefficient of
    permeability and i is the hydraulic gradient).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 265-266
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:a2
  statement_type: assumption
  modality: descriptive
  text: 'Compression is one-dimensional (strain occurs only in the vertical direction).
    The coefficient of permeability k and the coefficient of compressibility a_v remain
    constant during any given load increment. The applied load increment is instantaneous
    relative to the consolidation timescale.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 266-268
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The consolidation theory is strictly one-dimensional: it does not account
    for lateral deformation or three-dimensional stress states. It assumes small strains
    (linear theory), constant soil properties during each load increment, and full
    saturation. Secondary compression (creep) occurring after primary consolidation
    is not addressed. For highly compressible organic soils or thick strata with variable
    permeability, measured settlement rates may deviate significantly from the theoretical
    prediction.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: page_range
    locator: 290-295
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
