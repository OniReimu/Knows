- id: ev:omega-consistency-detail
  evidence_type: proof
  summary: 'Omega-consistency is needed specifically in step 2 of the Theorem VI
    proof to show not-G is not provable. Since G is unprovable, for each natural
    number n the statement "n does not prove G" is provable. If the system were
    omega-inconsistent, it could still prove the negation of the universal statement
    (i.e., prove not-G) even though all instances are individually provable. Rosser
    (1936) modified the self-referential sentence to eliminate the need for omega-
    consistency, requiring only simple consistency.

    '
