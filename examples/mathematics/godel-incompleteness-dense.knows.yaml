- id: ev:representability
  evidence_type: proof
  summary: 'Theorem V proof by induction on degree of primitive recursive functions.
    Base case (degree 1): constants and successor are trivially representable.
    Inductive step: if phi is built from lower-degree phi_1,...,phi_k by insertion
    and primitive recursion, and r_1,...,r_k are their relation signs, then the
    definition processes can be formally modeled in system P to obtain a new relation
    sign r satisfying the representability conditions. This ensures all 46 metamathematical
    concepts have corresponding formulas in P.

    '
