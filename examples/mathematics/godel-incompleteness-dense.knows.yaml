- id: stmt:c5
  statement_type: claim
  modality: theoretical
  text: 'The formal system P (for which undecidability is proved) is built by constructing
    PM-style logic on top of Peano arithmetic. It has five groups of axioms: (I) Peano
    axioms — three axioms for natural numbers (0 is not a successor, successor is
    injective, induction); (II) Propositional axioms — four schemas governing logical
    connectives; (III) Quantifier axioms — two schemas for universal quantification;
    (IV) Comprehension/reducibility axiom — existence of a class for any definable
    property; (V) Set axiom/extensionality — two classes are equal iff they have
    the same elements.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
