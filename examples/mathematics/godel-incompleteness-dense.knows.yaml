- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'Omega-consistency is strictly stronger than simple consistency. A system is
    omega-consistent if there is no class-sign a such that a(n) is provable for every
    natural number n, yet not-forall-x.a(x) is also provable. Simple consistency
    only requires that no formula and its negation are both provable. Goedel''s
    original Theorem VI requires omega-consistency specifically for step 2 (showing
    not-G is not provable). Rosser (1936) later strengthened the result to require
    only simple consistency.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 2.6
  confidence:
    claim_strength: high
