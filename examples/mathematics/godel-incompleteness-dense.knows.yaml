abstract: The development of mathematics towards greater exactness has led to large
  areas of it being formalized, so that proofs can be carried out according to a few
  mechanical rules. The most comprehensive formal systems set up so far are the system
  of Principia Mathematica and the Zermelo-Fraenkel axiom system of set theory. We
  show that in these systems there exist undecidable propositions.
