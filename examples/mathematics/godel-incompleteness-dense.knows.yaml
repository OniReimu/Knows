statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'First Incompleteness Theorem (Theorem VI): Any omega-consistent formal
    system F that is capable of expressing basic arithmetic (contains Peano arithmetic)
    is incomplete — there exist statements in the language of F that are true but
    not provable within F. Specifically, Goedel constructs a sentence G (= R_q(q))
    that asserts its own unprovability within F. Neither G nor not-G is provable
    (under omega-consistency).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem VI
    quote: every omega-consistent recursive class kappa of formulae there are recursive
      class-signs r, such that neither v Gen r nor Neg(v Gen r) belongs to Flg(kappa)
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Second Incompleteness Theorem (Theorem XI): If a consistent formal system F
    contains Peano arithmetic, then F cannot prove its own consistency. The formalized
    consistency statement Con(F) = not-Bew(goedel_num(0=1)) is not provable in F.
    The proof formalizes the First Incompleteness proof inside F, establishing that
    F proves Con(F) -> G; since G is unprovable, Con(F) must also be unprovable.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem XI
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
