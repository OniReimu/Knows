      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The undecidable sentence G is not only unprovable but also true (in the
    standard model of arithmetic). If F is consistent, G is true but unprovable;
    if not-G were provable, F would be inconsistent. This establishes a gap between
    truth and provability — there are true arithmetic statements that cannot be
    proved within any sufficiently strong consistent formal system.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
