- id: stmt:c6
  statement_type: claim
  modality: theoretical
  text: 'Two properties of a formal system are sufficient for Goedel''s incompleteness
    result to apply (Section 2.7): (1) The class of axioms and the relation "immediate
    consequence" must be primitive recursively definable when basic signs are replaced
    by numbers; (2) Every primitive recursive relation must be definable within the
    system (in the sense of Theorem V, i.e., decision-definite). Any system satisfying
    both conditions and being omega-consistent contains undecidable propositions of
    the form forall-x.F(x). This applies to Zermelo-Fraenkel set theory, von Neumann''s
    set theory, and any system whose axioms are generated by finitely many schemas.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 2.7, final paragraphs
