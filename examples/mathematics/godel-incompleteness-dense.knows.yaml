- id: stmt:c7
  statement_type: claim
  modality: theoretical
  text: 'Theorem V (representability): For every primitive recursive relation R(x_1,
    ..., x_n) there is a relation sign r in system P such that for each n-tuple
    (x_1, ..., x_n): if R holds, then subst(r, v, number(x)) is provable; if R
    does not hold, then not-subst(r, v, number(x)) is provable. This ensures that
    all 46 primitive recursive metamathematical relations can be "talked about"
    within the system.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 2.5, Theorem V
  confidence:
    claim_strength: high
