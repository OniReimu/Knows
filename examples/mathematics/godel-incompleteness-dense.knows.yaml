- id: stmt:c8
  statement_type: claim
  modality: theoretical
  text: 'The undecidable sentence is constructed via a diagonal self-reference analogous
    to the liar paradox but replacing truth with provability. Class-signs are formulas
    with exactly one free variable of type natural number, enumerated as R_1, R_2,
    .... The class K = {n in N | not-provable(R_n(n))}. Since K is definable in
    system P, there exists a class-sign S = R_q such that S(n) states n in K. The
    undecidable sentence R_q(q) then asserts "I am not provable" since R_q(q) <->
    S(q) <-> q in K <-> not-provable(R_q(q)).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 1 (introduction, informal sketch)
  confidence:
