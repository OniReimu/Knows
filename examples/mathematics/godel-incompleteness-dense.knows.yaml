- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Goedel numbering: Each symbol, formula, and proof sequence in the formal
    system is assigned a unique natural number via a primitive recursive encoding.
    Primitive symbols get unique numbers (0->1, succ->3, not->5, or->7, forall->9,
    open-paren->11, close-paren->13, variables of type n get prime powers p^n for
    primes p>13). A finite sequence (n_1, n_2, ..., n_k) maps to 2^{n_1} * 3^{n_2}
    * ... * p_k^{n_k} where p_k is the k-th prime. This is injective by the
    fundamental theorem of arithmetic, enabling the system to reason about its own
    syntax. Combined with the diagonal argument, this constructs the self-referential
    sentence G.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
