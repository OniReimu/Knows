summary: 'Dense agent-facing sidecar for Goedel''s 1931 incompleteness paper. Covers
  the First Incompleteness Theorem (Theorem VI, omega-consistency), Second Incompleteness
  Theorem (Theorem XI), Goedel numbering scheme (prime factorization encoding),
  the 46 primitive recursive relations, the formal system P (five axiom groups),
  the diagonal self-reference construction (class-signs, class K, R_q(q)), distinction
  between omega-consistency and simple consistency, Rosser''s strengthening, Hilbert''s
  program refutation, Theorem V (representability of primitive recursive relations),
  and applicability conditions (Section 2.7). All evidence is proof-based.

  '
