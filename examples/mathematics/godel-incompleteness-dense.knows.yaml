evidence:
- id: ev:goedel-sentence
  evidence_type: proof
  summary: 'Construction of the Goedel sentence G via diagonal self-reference. Class-signs
    are formulas with one free variable, enumerated as R_1, R_2, .... Define class
    K = {n | not-provable(R_n(n))}. Since K is definable, there is a class-sign S
    = R_q such that S(n) says n in K. Then R_q(q) <-> not-provable(R_q(q)), i.e.,
    R_q(q) says "I am not provable." If F is consistent, R_q(q) is not provable
    (assuming provability would yield truth of not-provable, contradiction). If F
    is omega-consistent, not-R_q(q) is also not provable (since for each n, "n does
    not prove R_q(q)" is provable, and omega-consistency prevents proving the negation
    of the universal statement). Hence G is undecidable.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 1 and Theorem VI proof
  observations:
  - metric: goedel_sentence_status
    qualitative_value: Undecidable in F — neither G nor not-G is provable (under omega-consistency)
  - metric: self_reference_mechanism
    qualitative_value: 'Diagonal construction: R_q(q) <-> not-provable(R_q(q))'
  - metric: analogy
    qualitative_value: Analogous to liar paradox and Richard antinomy, but replaces
      truth with provability
  provenance:
    origin: author
