  statement_type: claim
  modality: theoretical
  text: 'The Second Incompleteness Theorem directly refutes Hilbert''s program, which
    sought to prove the consistency of mathematics using finitary methods formalizable
    within the system itself. Since no consistent system containing arithmetic can
    prove its own consistency, a finitary consistency proof (as Hilbert envisioned)
    is impossible for such systems.

    '
