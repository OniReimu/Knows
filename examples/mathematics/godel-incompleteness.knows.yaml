evidence:
- id: ev:goedel-sentence
  evidence_type: proof
  summary: 'Construction of the Goedel sentence G via the diagonal lemma. Using Goedel
    numbering, a primitive recursive relation Bew(x) ("x is the Goedel number of a
    provable formula") is defined. The diagonal lemma yields a sentence G such that
    F proves G <-> ~Bew(goedel_num(G)). If F is consistent, G is not provable; if
    F is omega-consistent, ~G is also not provable. Hence G is undecidable in F.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem VI, proof
  observations:
  - metric: goedel_sentence_status
    qualitative_value: Undecidable in F — neither G nor ~G is provable (under omega-consistency)
  - metric: self_reference_mechanism
    qualitative_value: Diagonal lemma applied to the provability predicate Bew(x)
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:second-incompleteness
  evidence_type: proof
  summary: 'Proof of the Second Incompleteness Theorem (Theorem XI). The consistency
    statement Con(F) can be formalized as ~Bew(goedel_num(0=1)). The proof of the
    First Theorem can itself be formalized within F, showing that F proves Con(F)
    -> G. Since G is unprovable in F (by Theorem VI), Con(F) must also be unprovable
    in F.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem XI, proof
  observations:
  - metric: consistency_provability
    qualitative_value: Con(F) is not provable within F, assuming F is consistent
  - metric: proof_strategy
    qualitative_value: Formalize First Incompleteness proof inside F; derive Con(F)
      -> G; contrapositive gives unprovability of Con(F)
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:goedel-numbering
  evidence_type: proof
  summary: 'Goedel demonstrates that 46 specific relations and functions used in metamathematics
    (substitution, concatenation, provability) are all primitive recursive and therefore
    representable in any system containing Peano arithmetic. This arithmetization
    is the technical backbone enabling self-reference.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 2, relations 1-46
  observations:
  - metric: primitive_recursive_relations
    qualitative_value: 46 metamathematical relations shown to be primitive recursive
  - metric: encoding_scheme
    qualitative_value: 'Prime factorization encoding: sequence (a1, a2, ..., an) maps
      to 2^a1 * 3^a2 * ... * p_n^an'
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:hilbert-refutation
  evidence_type: proof
  summary: 'The Second Incompleteness Theorem directly refutes Hilbert''s program,
    which sought to prove the consistency of mathematics using finitary methods formalizable
    within the system itself. Since no consistent system containing arithmetic can
    prove its own consistency, a finitary consistency proof (as Hilbert envisioned)
    is impossible for such systems.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 4, discussion
  observations:
  - metric: hilbert_program_status
    qualitative_value: Refuted — finitary consistency proof impossible for systems
      containing arithmetic
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
