- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The incompleteness theorems do not apply to formal systems that are too weak
    to express arithmetic (e.g., Presburger arithmetic, which is complete and decidable).
    Nor do they apply to systems that are not recursively axiomatizable. The theorems
    set a boundary on what sufficiently expressive formal systems can achieve, not
    on mathematics as a whole.

    '
