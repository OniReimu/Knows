summary: 'Agent-facing sidecar for Goedel''s 1931 incompleteness paper. The First
  Incompleteness Theorem shows that any consistent formal system capable of expressing
  basic arithmetic contains true statements that cannot be proved within the system.
  The Second Incompleteness Theorem shows that such a system cannot prove its own
  consistency. Evidence is entirely proof-based — no experiments, no data, no benchmarks.

  '
