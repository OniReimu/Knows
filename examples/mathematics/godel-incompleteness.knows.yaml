      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Goedel numbering: Each symbol, formula, and proof sequence in the formal
    system is assigned a unique natural number (Goedel number) via a primitive recursive
    encoding. This arithmetizes metamathematics, allowing the system to reason about
    its own syntax. Combined with a diagonal argument (self-reference lemma), this
    constructs a sentence G that effectively says "I am not provable in F."

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 1-2
