statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'First Incompleteness Theorem: Any consistent formal system F that is capable
    of expressing basic arithmetic (contains Peano arithmetic) is incomplete — there
    exist statements in the language of F that are true but not provable within F.
    Specifically, Goedel constructs a sentence G that asserts its own unprovability
    within F.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem VI
    quote: every omega-consistent recursive class kappa of formulae there are recursive
      class-signs r, such that neither v Gen r nor Neg(v Gen r) belongs to Flg(kappa)
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Second Incompleteness Theorem: If a consistent formal system F contains Peano
    arithmetic, then F cannot prove its own consistency. That is, the formalized statement
    Con(F) is not provable in F.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Theorem XI
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The undecidable sentence G is not only unprovable but also true (in the standard
    model of arithmetic). If F is consistent, G is true but unprovable; if ~G were
    provable, F would be inconsistent. This establishes a gap between truth and provability.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section 2-3
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
