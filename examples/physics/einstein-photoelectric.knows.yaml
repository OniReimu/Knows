      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:ionization-energy
  evidence_type: observation
  summary: 'Section 8: Einstein estimates the threshold frequency for the photoelectric
    effect using known ionization potentials. For a typical metal with work function
    of a few electron volts, the threshold frequency lies in the ultraviolet, consistent
    with experimental observations. He uses the numerical value of Planck''s constant
    h = 6.55e-27 erg*sec (close to the modern value of 6.626e-34 J*s).

    '
  source_anchors:
