evidence:
- id: ev:entropy-analogy
  evidence_type: proof
  summary: 'Sections 5-6: Einstein derives the entropy of monochromatic radiation
    in the Wien regime as S = (E / h*nu) * k * [ln(V/V_0) + const]. This has the same
    form as the entropy of N independent particles in a volume V: S = N*k*ln(V/V_0).
    The formal equivalence with N = E/(h*nu) implies radiation behaves as if composed
    of N independent quanta each of energy h*nu.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: sections 5-6
  observations:
  - metric: photon_energy
    qualitative_value: E_quantum = h * nu (derived from entropy analogy)
    qualifiers:
      method: thermodynamic derivation
      regime: Wien limit (h*nu >> kT)
  - metric: entropy_form
    qualitative_value: S = (E/h*nu) * k * ln(V/V_0) — identical to ideal gas of N
      = E/(h*nu) particles
    qualifiers:
      type: formal mathematical analogy
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:photoelectric-equation
  evidence_type: observation
  summary: 'Section 8: Einstein derives the photoelectric equation KE_max = h*nu -
    W and notes it is consistent with Lenard''s experimental observations: (1) maximum
    electron velocity depends on frequency, not intensity; (2) there is a threshold
    frequency below which no emission occurs; (3) increasing intensity increases the
    number of emitted electrons but not their maximum energy.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: section 8
  observations:
  - metric: photoelectric_equation
    qualitative_value: KE_max = h*nu - W (work function W is material-dependent)
    qualifiers:
      type: theoretical prediction
  - metric: threshold_frequency
    qualitative_value: nu_0 = W / h; no emission for nu < nu_0 regardless of intensity
    qualifiers:
      type: theoretical prediction
  - metric: intensity_dependence
    qualitative_value: Number of emitted electrons proportional to intensity; max
      KE independent of intensity
    qualifiers:
      type: consistent with Lenard's observations
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:lenard-observations
  evidence_type: citation_backed
  summary: 'Lenard''s 1902 experiments on the photoelectric effect provide the empirical
    basis that Einstein''s theory explains. Key observations: (1) electron kinetic
    energy increases linearly with light frequency; (2) a minimum frequency is required
    for electron emission; (3) classical wave theory predicts energy should depend
    on intensity, which is contradicted by experiment.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: section 8
  observations:
