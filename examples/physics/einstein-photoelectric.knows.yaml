      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The paper explicitly presents itself as a heuristic point of view, not a
    definitive theory. It cannot explain wave phenomena such as diffraction and interference.
    The full reconciliation of the particle and wave natures of light required quantum
    mechanics (wave-particle duality, developed 1920s). Additionally, the Wien approximation
    used in the derivation breaks down in the low-frequency regime (Rayleigh-Jeans
    limit).

    '
