abstract: A profound formal distinction exists between the theoretical concepts which
  physicists have formed regarding gases and other ponderable bodies and the Maxwellian
  theory of electromagnetic processes in so-called empty space. According to the theory
  to be developed here, the energy of a light ray spreading from a point source is
  not continuously distributed over an increasing space but consists of a finite number
  of energy quanta localized at points in space.
