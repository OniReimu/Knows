    qualitative_value: 'Linear relationship: KE_max increases with frequency nu'
    qualifiers:
      source: Lenard 1902
  - metric: electron_ke_vs_intensity
    qualitative_value: 'No dependence: KE_max independent of light intensity'
    qualifiers:
      source: Lenard 1902
      note: contradicts classical wave theory
  provenance:
