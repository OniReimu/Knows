summary: 'Agent-facing sidecar for Einstein''s 1905 paper proposing the light quantum
  hypothesis and its application to the photoelectric effect. Covers the central claim
  that light consists of discrete energy quanta (E = h*nu), the derivation of the
  photoelectric equation (KE = h*nu - W), the threshold frequency prediction, and
  the thermodynamic analogy underpinning the argument.

  '
