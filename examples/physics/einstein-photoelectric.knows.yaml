statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Light consists of discrete energy quanta (later called photons). Each quantum
    carries energy E = h*nu, where h is Planck''s constant and nu is the frequency
    of the light. This is not merely a mathematical convenience but reflects the physical
    reality that monochromatic radiation of frequency nu behaves as if it consists
    of independent energy quanta of magnitude h*nu.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: sections 1-6
    quote: die Energie des Lichtes diskontinuierlich verteilt ist
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'The photoelectric effect is explained by the absorption of single light quanta
    by individual electrons. The maximum kinetic energy of an emitted electron is
    given by KE_max = h*nu - W, where W is the work function (minimum energy needed
    to extract the electron from the material surface).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: section 8
    quote: die kinetische Energie des Elektrons ... R*beta*nu/N - P
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'There exists a threshold frequency nu_0 = W / h below which no electrons
    are emitted regardless of the intensity of the incident light. This directly contradicts
    the classical wave theory prediction that sufficient intensity at any frequency
    should eventually eject electrons.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
