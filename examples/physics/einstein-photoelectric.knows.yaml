- id: stmt:m1
  statement_type: method
  modality: theoretical
  text: 'The light quantum hypothesis is derived by thermodynamic analogy. Einstein
    shows that the entropy of monochromatic radiation in the Wien regime (h*nu >>
    kT) has the same mathematical form as the entropy of an ideal gas of independent
    particles, each carrying energy h*nu. This formal correspondence motivates treating
    radiation as composed of discrete, localized energy quanta.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: sections 5-6
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: theoretical
  text: 'The derivation assumes the Wien approximation to Planck''s radiation law,
    which is valid only in the high-frequency (h*nu >> kT) regime. Einstein explicitly
    notes this is a heuristic viewpoint ("heuristisch"), not a complete theory of
    light. The energy distribution in space is assumed to be discontinuous — a radical
    departure from Maxwell''s electromagnetic theory.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: sections 1-2, title
    quote: heuristischen Gesichtspunkt
  confidence:
    claim_strength: high
