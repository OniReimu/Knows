    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'Stokes'' rule for fluorescence (the emitted light frequency is always less
    than or equal to the exciting frequency) is a natural consequence of the light
    quantum hypothesis: a photon of energy h*nu can only produce a fluorescent photon
    of energy h*nu'' where nu'' <= nu.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
