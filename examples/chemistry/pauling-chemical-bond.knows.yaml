- id: stmt:c6
  statement_type: claim
  modality: theoretical
  text: 'Two d eigenfunctions combined with s and three p eigenfunctions (d2sp3 hybridization)
    give six equivalent octahedral bond eigenfunctions of strength 2.923, directed
