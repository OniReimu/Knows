statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'The electron-pair bond is formed through the interaction of an unpaired electron
    on each of two atoms. The spins of the electrons are opposed when the bond is
    formed, and the bond energy arises primarily from the quantum mechanical resonance
    (exchange) energy, which depends on electrostatic forces rather than magnetic
    interactions.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
