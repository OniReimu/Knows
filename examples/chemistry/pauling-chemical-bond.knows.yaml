- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Of two eigenfunctions with the same dependence on r, the one with the larger
    value in the bond direction will give rise to the stronger bond (Rule 5). This
    maximum-overlap principle determines the spatial orientation and relative strength
    of bonds. A p eigenfunction, with maximum value sqrt(3) approx 1.732 along its
    axis, forms stronger bonds than an s eigenfunction (value 1 in all directions),
    and the best sp3 tetrahedral eigenfunction reaches a maximum of 2.000.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section I, Rules 5 and 6
    quote: the one with the larger value in the bond direction will give rise to the
      stronger bond
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
