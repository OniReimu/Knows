- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Pauling applies the variational method of quantum mechanics to determine
    the optimal linear combinations of atomic s, p, and d eigenfunctions for bond
    formation. The coefficients in these linear combinations are chosen to maximize
    the overlap (concentration) of the bond eigenfunction in the direction of the
    bonded atom, subject to orthogonality and normalization constraints. Bond strength
    is quantified as the maximum value of the angular part of the eigenfunction. Results
    are correlated with experimental data from crystal structures (x-ray), band spectra,
    electric dipole moments, and thermochemistry.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section I, derivation outline
