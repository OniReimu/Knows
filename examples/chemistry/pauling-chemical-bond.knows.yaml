abstract: With the aid of the quantum mechanics there is formulated a set of rules
  regarding electron-pair bonds, dealing particularly with the strength of bonds in
  relation to the nature of the single-electron eigenfunctions involved. From s and
  p eigenfunctions the best bond eigenfunctions are four equivalent tetrahedral eigenfunctions,
  giving bonds directed toward the corners of a regular tetrahedron. A single d eigenfunction
  with s and p gives four strong bonds in a square plane. Two d eigenfunctions with
  s and p give six octahedral eigenfunctions. The magnetic moment of a complex ion
  is determined by the number of unpaired electrons, permitting the distinction between
  electron-pair bonds and ionic bonds from magnetic data.
