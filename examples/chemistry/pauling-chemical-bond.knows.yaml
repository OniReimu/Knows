- id: ev:s-p-energy-criterion
  evidence_type: observation
  summary: 'Pauling establishes a quantitative criterion for whether hybridization
    occurs: the s-p quantization is broken (hybridization happens) when bond energy
    exceeds the s-p energy separation. For carbon, the s-p separation is approximately
    9.3 eV (~200,000 cal/mol) while single bond energy is approximately 100,000 cal/mol;
    four bonds provide approximately 400,000 cal/mol total, easily breaking the quantization.
    For bivalent oxygen, only approximately 200,000 cal/mol bond energy is available
    versus approximately 400,000 cal/mol for promoting two s electrons, so p eigenfunctions
    are retained and 90-degree bonds result.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section I, Change of Quantization
  observations:
  - metric: carbon_s_p_separation
