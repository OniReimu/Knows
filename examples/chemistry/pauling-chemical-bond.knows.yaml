- id: stmt:c7
  statement_type: claim
  modality: theoretical
  text: 'Each tetrahedral bond eigenfunction is cylindrically symmetrical about its
    bond direction, so bond energy is independent of orientation about a single bond
    (free rotation). A double bond lacks this symmetry, preventing free rotation and
    giving rise to distinct cis and trans isomers separated by 180 degrees. This provides
    the quantum mechanical basis for the long-known phenomenon of geometric isomerism
    about double bonds.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section I, Free or Restricted Rotation
    quote: there are two stable states for a simple compound involving a double bond,
      a cis and a trans state, differing in orientation by 180 degrees. There is no
      free rotation about a double bond
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
