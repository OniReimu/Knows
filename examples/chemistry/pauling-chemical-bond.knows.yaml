title: The Nature of the Chemical Bond. Application of Results Obtained from the Quantum
  Mechanics and from a Theory of Paramagnetic Susceptibility to the Structure of Molecules
summary: 'Agent-facing sidecar for Pauling''s 1931 paper deriving the theory of directed
  valence bonds from quantum mechanics. Covers the central results of orbital hybridization
  (sp3 tetrahedral, dsp2 square planar, d2sp3 octahedral), the quantitative bond-strength
  criterion based on eigenfunction overlap, predictions of bond angles for water (90
  degrees from pure p) and carbon (109 degrees 28 minutes from sp3), free vs. restricted
  rotation about single and double bonds, and a complete theory of magnetic moments
  of transition-metal complexes that distinguishes covalent from ionic bonding.

  '
