      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'When s-p quantization is NOT broken (bond energy insufficient to overcome
    the s-p separation), two unpaired p electrons form bonds at approximately 90 degrees.
    This explains the bent geometry of H2O (bond angle 90 degrees or slightly larger),
    the pyramidal structure of NH3, and the 90-degree bonds in H2S, H2Se, and H2Te.

    '
