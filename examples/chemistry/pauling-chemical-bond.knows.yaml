- id: stmt:c5
  statement_type: claim
  modality: theoretical
  text: 'A single d eigenfunction combined with s and three p eigenfunctions (dsp2
    hybridization) gives four strong square planar bonds of strength 2.694, directed
    toward the corners of a square. This explains the square planar geometry of bivalent
    Ni, Pd, and Pt complexes such as K2Ni(CN)4, K2PdCl4, and K2PtCl4, where eight
    unshared d electrons occupy four of the five d orbitals.

    '
