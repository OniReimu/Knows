    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'When the s-p energy separation is small relative to the bond energy, s and
    p eigenfunctions combine to form four equivalent tetrahedral bond eigenfunctions
    (sp3 hybridization) directed toward the corners of a regular tetrahedron at mutual
    angles of 109 degrees 28 minutes. Each has a bond strength of 2.000. This provides
    the quantum mechanical justification for the chemist''s tetrahedral carbon atom
    in diamond and all aliphatic compounds, as well as for tetrahedral nitrogen (in
    NH4+) and phosphorus atoms.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: Section I, The Tetrahedral Carbon Atom
    quote: an atom in which only s and p eigenfunctions contribute to bond formation
      and in which the quantization in polar coordinates is broken can form one, two,
      three, or four equivalent bonds, which are directed toward the corners of a
      regular tetrahedron
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
