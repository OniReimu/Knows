- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Gaps in the periodic table correspond to undiscovered elements whose properties
    can be predicted from the positions of their neighbours. Mendeleev predicted three
    elements in detail: eka-aluminium (later gallium, discovered 1875), eka-boron
    (later scandium, discovered 1879), and eka-silicon (later germanium, discovered
    1886).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
