- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Systematic tabulation and comparison of all known elements (63 at the time)
    arranged by increasing atomic weight, examining periodicity in valence, oxide
    formulae, physical properties (density, melting point, atomic volume), and chemical
    reactivity. The method is inductive: patterns are extracted from comprehensive
    data compilation rather than derived from first principles.

    '
