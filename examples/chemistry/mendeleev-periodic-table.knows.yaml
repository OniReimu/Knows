statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'Elements arranged according to the magnitude of their atomic weights show
    a clear periodicity of properties. Physical and chemical characteristics of elements
    (valence, density, melting point, oxide formulae, atomic volume) recur at regular
    intervals when elements are listed in order of increasing atomic weight.

    '
  about_ref: art:paper
  status: asserted
