title: The Relation between the Properties and Atomic Weights of the Elements
summary: 'Agent-facing sidecar for Mendeleev''s 1869 paper proposing the periodic
  law and the first systematic periodic table of elements. Covers the central claim
  of periodicity in elemental properties when arranged by atomic weight, the prediction
  of undiscovered elements (eka-aluminium, eka-silicon), and the known limitation
  of atomic weight ordering anomalies later resolved by Moseley''s atomic number.

  '
