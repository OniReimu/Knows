- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The periodic system assumes that atomic weight is the fundamental ordering
    parameter for elements. Mendeleev treated atomic weight as an intrinsic, defining
    property. This assumption is approximately correct but not exact — the true ordering
    parameter is atomic number (proton count), as established by Moseley in 1913.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: main text
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'Ordering by atomic weight produces anomalies where the periodic pattern requires
    reversing the weight order. Notable cases: tellurium (127.6) and iodine (126.9)
    must be swapped; cobalt (58.93) and nickel (58.69) must be swapped. Mendeleev
    acknowledged these anomalies but attributed them to inaccurate atomic weight measurements.
    The true resolution came from Moseley (1913), who showed atomic number (not weight)
    is the correct ordering parameter.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
