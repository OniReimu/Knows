- id: ev:atomic-weight-corrections
  evidence_type: observation
  summary: 'Mendeleev used the periodic system to challenge accepted atomic weights.
    He proposed beryllium''s atomic weight should be ~9.4 (not ~13.5 as then accepted),
    changing its valence from III to II and placing it above magnesium. This correction
    was confirmed by later measurements. Similarly, he corrected indium from ~75.6
    (valence II) to ~113 (valence III).

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: section
    locator: main text
  observations:
