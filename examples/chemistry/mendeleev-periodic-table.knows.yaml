abstract: Arranging the elements by their atomic weights in vertical columns so that
  the horizontal rows contain analogous elements, still sorted by increasing atomic
  weight, one obtains a periodic repetition of properties. Elements with similar chemical
  and physical properties either have similar atomic weights or show a uniform increase
  in atomic weight.
