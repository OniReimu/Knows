- id: ev:eka-aluminium-prediction
  evidence_type: observation
  summary: 'Mendeleev predicted eka-aluminium (gap below aluminium) with atomic weight
    ~68, density ~6.0 g/cm3, low melting point, and the ability to form an oxide of
    formula El2O3. In 1875, Lecoq de Boisbaudran discovered gallium: atomic weight
    69.72, density 5.91 g/cm3, melting point 29.76 C, oxide Ga2O3. The match is striking.

    '
  source_anchors:
