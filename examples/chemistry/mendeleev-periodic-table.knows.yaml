- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'Some accepted atomic weights must be corrected based on the periodic system.
    Mendeleev proposed corrections to the atomic weights of several elements (e.g.,
    adjusting beryllium from ~13.5 to ~9.4, indium from ~75.6 to ~113) to fit the
    periodic pattern, corrections that were subsequently validated.

    '
