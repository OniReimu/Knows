      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:m2
  statement_type: method
  modality: descriptive
  text: 'Prospect theory distinguishes two phases in the choice process: (1) an editing
    phase that simplifies prospects via coding, combination, segregation, cancellation,
    simplification, and dominance detection; (2) an evaluation phase where edited
    prospects are scored using V(x,p;y,q) = pi(p)*v(x) + pi(q)*v(y) for regular
    prospects, and V(x,p;y,q) = v(y) + pi(p)*[v(x)-v(y)] for strictly positive or
    negative prospects (where p+q=1).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 274-278
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:m3
  statement_type: method
  modality: descriptive
  text: 'The four major editing operations are: (1) Coding — perceiving outcomes as
    gains and losses relative to a reference point (usually current asset position);
    (2) Combination — combining probabilities associated with identical outcomes,
    e.g. (200,.25;200,.25) becomes (200,.50); (3) Segregation — separating a riskless
    component from the risky component, e.g. (300,.80;200,.20) decomposes into a
    sure 200 plus risky (100,.80); (4) Cancellation — discarding components shared
    by all prospects under consideration. Two additional operations are simplification
    (rounding) and detection of dominance.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 274-276
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c12
  statement_type: claim
  modality: empirical
  text: 'The paper demonstrates violations of the substitution axiom of expected utility
    theory. Expected utility requires that if B is preferred to A, then any probability
    mixture (B,p) must be preferred to (A,p). Subjects systematically violate this:
    reducing probability from 1.0 to .25 has a greater effect than reduction from
    .8 to .2. Three tenets of EU are violated: (i) expectation, (ii) asset integration,
    (iii) universal risk aversion.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 265-274
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c13
  statement_type: claim
  modality: empirical
  text: 'Problems 11 and 12 demonstrate that carriers of value are changes in wealth,
    not final asset positions. In Problem 11 (given bonus 1000), 84% chose sure 500
    over (1000,.50). In Problem 12 (given bonus 2000), 69% chose (-1000,.50) over
