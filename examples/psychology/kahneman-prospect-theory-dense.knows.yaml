  evidence_type: survey_result
  summary: 'Problem 11 (bonus 1000, N=70): 84% chose sure 500 (B) over (1000,.50).
    Problem 12 (bonus 2000, N=68): 69% chose (-1000,.50) over sure -500. The two
    problems are identical in final wealth: both offer a choice between 1500 certain
