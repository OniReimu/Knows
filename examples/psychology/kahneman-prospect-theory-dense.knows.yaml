- id: ev:problem14-overweight
  evidence_type: survey_result
  summary: 'Problem 14 (N=72): 72% prefer (5000,.001) over a sure 5. This implies
    pi(.001)*v(5000)>v(5), hence pi(.001)>v(5)/v(5000)>.001 (given concave v). Problem
    14-prime: preference for sure -5 over (-5000,.001) implies the same overweighting
    for loss domain (given convex v for losses).

