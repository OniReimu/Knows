    locator_type: page_range
    locator: 274-277
    quote: the carriers of value are changes in wealth or welfare, rather than final
      states
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Loss aversion: losses loom larger than equivalent gains. The disutility of
    losing a given amount is roughly twice the utility of gaining the same amount
    (approximately 2:1 loss-to-gain ratio). People find symmetric bets (x, .50; -x,
    .50) distinctly unattractive, and this aversiveness increases with stake size.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: '279'
    quote: the aggravation that one experiences in losing a sum of money appears to
      be greater than the pleasure associated with gaining the same amount
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'People systematically overweight small probabilities and underweight moderate-to-large
    probabilities. The decision weight function pi(p) is not linear in probability:
    pi(p) > p for small p (explaining lottery ticket purchases), and pi(p) < p for
    moderate-to-high p (explaining insurance purchases beyond actuarial value).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 280-284
    quote: low probabilities are overweighted
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: empirical
  text: 'The value function v(x) is concave for gains and convex for losses, producing
    an S-shaped curve. This implies diminishing sensitivity: the marginal value of
    both gains and losses decreases with their magnitude. The function is steeper
    for losses than for gains (loss aversion). Three properties: (i) defined on deviations
    from reference point; (ii) generally concave for gains and convex for losses;
    (iii) steeper for losses than for gains.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 278-280
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
