- id: stmt:c11
  statement_type: claim
  modality: empirical
  text: 'Problem 1 (Allais-type): 82% of N=72 subjects chose the certain 2,400 over
    the gamble (2500, .33; 2400, .66; 0, .01). In Problem 2, 83% chose (2500, .33)
