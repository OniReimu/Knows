      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c8
  statement_type: claim
  modality: empirical
  text: 'Subcertainty: for all 0 < p < 1, the decision weights satisfy pi(p) + pi(1-p)
    < 1. The sum of decision weights for complementary events is typically less than
    the weight associated with the certain event. This captures the idea that preferences
    are generally less sensitive to probability variations than the expectation principle
    would dictate.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 282-283
    quote: pi(p) + pi(1-p) is typically less than unity
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c9
  statement_type: claim
  modality: empirical
  text: 'Subadditivity and subproportionality of the weighting function: for small
    p, pi(rp) > r*pi(p) for 0 < r < 1 (subadditivity). Subproportionality means that
    for a fixed ratio of probabilities, the ratio of decision weights is closer to
    unity when probabilities are low than when they are high. Subproportionality holds
    if and only if log pi is a convex function of log p.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 281-282
  confidence:
    claim_strength: high
