- id: ev:value-function-shape
  evidence_type: survey_result
  summary: 'Aggregate choice patterns support an S-shaped value function. Problem
    13 (N=68): subjects prefer split gains (4000,.25;2000,.25) over single (6000,.25),
    implying v(6000)<v(4000)+v(2000) (concavity for gains). Problem 13-prime (N=64):
    70% prefer (-6000,.25) over split losses, implying v(-6000)>v(-4000)+v(-2000)
    (convexity for losses). Loss aversion ratio approximately 2:1, later refined to
    lambda=2.25 in Tversky & Kahneman 1992.

    '
  source_anchors:
