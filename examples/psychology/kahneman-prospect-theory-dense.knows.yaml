    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c10
  statement_type: claim
  modality: empirical
  text: 'Probabilistic insurance is generally unattractive to people, despite expected
    utility theory (with concave u) implying it should be superior to regular insurance.
    Reducing loss probability from p to p/2 is less valuable than reducing from p/2
    to 0. This demonstrates that the intuitive notion of risk is not captured by
    concavity of utility.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
