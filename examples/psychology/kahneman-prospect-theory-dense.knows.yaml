      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c5
  statement_type: claim
  modality: empirical
  text: 'The certainty effect: people overweight outcomes that are obtained with certainty
    relative to outcomes that are merely probable. This contributes to risk aversion
    in the domain of gains (preferring a sure gain over a larger probable one) and
    risk seeking in the domain of losses (preferring a probable loss over a smaller
    certain loss).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 265-269
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
