- id: ev:problem9-probabilistic-insurance
  evidence_type: survey_result
  summary: 'Problem 9 (N=95 Stanford students): 80% rejected probabilistic insurance
    (paying half premium for 50% coverage probability). EU theory with concave u
    implies probabilistic insurance should be superior to regular insurance. The
    rejection shows that reducing loss probability from p to p/2 is worth less than
    reducing from p/2 to 0.

    '
