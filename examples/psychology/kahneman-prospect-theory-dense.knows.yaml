- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The authors conducted a series of choice experiments presenting hypothetical
    gambles to university students and faculty (primarily at Hebrew University and
    the University of Stockholm). Subjects chose between pairs of prospects with
    stated probabilities and payoffs in Israeli pounds (median net monthly family
    income approximately 3,000 Israeli pounds). Modal choices were used to identify
    systematic violations of expected utility theory. Several forms of each questionnaire
    were used with different orderings and left-right reversal of prospects.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 265-269
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
