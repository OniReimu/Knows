    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c6
  statement_type: claim
  modality: empirical
  text: 'The reflection effect: reversing the sign of outcomes (gains to losses) reverses
    the preference order. Risk aversion in the positive domain is accompanied by risk
    seeking in the negative domain. The same psychological principle (overweighting
    of certainty) drives both patterns.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 268-270
    quote: the reflection of prospects around 0 reverses the preference order
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c7
  statement_type: claim
  modality: empirical
  text: 'The isolation effect: people simplify choices by discarding components shared
    by all prospects, focusing on distinguishing components. Different decompositions
    of the same prospects can lead to different preferences, violating the assumption
    that choices depend solely on probabilities of final states.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 271-274
    quote: people often disregard components that the alternatives share
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
