title: 'Prospect Theory: An Analysis of Decision under Risk'
summary: 'Dense agent-facing sidecar for Kahneman & Tversky''s 1979 Econometrica paper
  on prospect theory. Covers all major experimental problems (1-14), the editing phase
  (coding, combination, segregation, cancellation), the evaluation phase (value function,
  weighting function), the certainty effect, reflection effect, isolation effect,
  subcertainty, subadditivity, loss aversion, and the S-shaped value function. Evidence
  includes specific choice percentages and sample sizes for each problem.

  '
