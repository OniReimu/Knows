- id: ev:subcertainty-proof
  evidence_type: survey_result
  summary: 'Subcertainty derived from Allais-type preferences. From Problems 1 and
    2: applying the prospect theory equation to the modal preferences yields [1-pi(.66)]v(2400)
    > pi(.33)v(2500) and pi(.34)v(2400) < pi(.33)v(2500), which combined imply
    pi(.66)+pi(.34) < 1. From the original Allais example: pi(.89)+pi(.11) < 1.

    '
