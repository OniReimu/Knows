evidence:
- id: ev:certainty-effect
  evidence_type: survey_result
  summary: 'Problem 1 vs Problem 2 (certainty effect): 80% of subjects prefer (4000,
    .80) over (3000, 1.0) is reversed — actually 80% prefer the certain 3000 over
    (4000, .80), demonstrating risk aversion for gains. But in Problem 3 (loss domain),
    92% prefer (-4000, .80) over (-3000, 1.0), showing risk seeking for losses. This
    "reflection effect" systematically violates expected utility theory.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 265-268
  observations:
  - metric: choice_pct_certain_gain
    value: 80
    unit: percent
    qualifiers:
      problem: '1'
      n: 72
      preferred: (3000, 1.0) over (4000, 0.80)
      domain: gains
      note: risk aversion for gains
  - metric: choice_pct_risky_loss
    value: 92
    unit: percent
    qualifiers:
      problem: '3'
      n: 95
      preferred: (-4000, 0.80) over (-3000, 1.0)
      domain: losses
      note: risk seeking for losses — reflection effect
  - metric: expected_value_risky
    value: 3200
    unit: Israeli pounds
    qualifiers:
      problem: '1'
      computation: 4000 * 0.80
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:probability-weighting
  evidence_type: survey_result
  summary: 'Problem 7 and 8 demonstrate overweighting of small probabilities. In Problem
    7, 72% prefer (6000, .001) over (3000, .002) even though the expected values are
    equal. For Problem 8 (loss domain), the pattern reverses. Problem 14 shows the
    Allais paradox: preferences between (2500, .33; 2400, .66; 0, .01) and (2400,
    1.0) shift when common components are removed.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 267-271
  observations:
  - metric: choice_pct_overweight_small_p
    value: 72
    unit: percent
    qualifiers:
      problem: '7'
      n: 66
      preferred: (6000, 0.001) over (3000, 0.002)
      note: overweighting of small probability despite equal EV
  - metric: certainty_equivalent_ratio
    qualitative_value: pi(0.001)/pi(0.002) > 1/2, implying overweighting of the smaller
      probability
    qualifiers:
      derived: from choice pattern
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:isolation-effect
  evidence_type: survey_result
  summary: 'Problem 10 (two-stage gamble): 78% prefer a sure 3000 in the second stage
    over (4000, .80), identical in compound probability to Problem 4 where 65% prefer
    (4000, .20) over (3000, .25). The shift demonstrates the isolation effect — people
    decompose prospects differently depending on framing, ignoring components shared
    by both options.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 271-273
  observations:
  - metric: choice_pct_sure_second_stage
    value: 78
    unit: percent
    qualifiers:
      problem: '10'
      n: 141
      preferred: sure 3000 in stage 2
      note: isolation effect — same compound probability as Problem 4
  - metric: choice_pct_risky_single_stage
    value: 65
    unit: percent
    qualifiers:
      problem: '4'
      n: 95
      preferred: (4000, 0.20) over (3000, 0.25)
      note: preference reversal from Problem 10 despite identical compound probabilities
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:value-function-shape
  evidence_type: survey_result
  summary: 'The aggregate choice patterns across all problems support an S-shaped
    value function: concave for gains (risk aversion), convex for losses (risk seeking),
    with a steeper slope for losses than gains. The loss aversion coefficient (ratio
    of loss slope to gain slope at the reference point) is approximately 2 to 2.5,
    later refined in subsequent work.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 278-280
  observations:
  - metric: value_function_shape_gains
    qualitative_value: Concave — diminishing marginal value for increasing gains
  - metric: value_function_shape_losses
    qualitative_value: Convex — diminishing marginal disvalue for increasing losses
  - metric: loss_aversion_ratio
    qualitative_value: Approximately 2:1 — losses roughly twice as impactful as equivalent
      gains
    qualifiers:
      note: Approximate ratio inferred from choice patterns; later quantified precisely
        as lambda ~= 2.25 in Tversky & Kahneman 1992
  - metric: value_function_symmetry
    qualitative_value: 'Asymmetric S-shape: steeper for losses, flatter for gains'
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
