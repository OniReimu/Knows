    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The authors conducted a series of choice experiments presenting hypothetical
    gambles to university students and faculty. Subjects chose between pairs of prospects
    (gambles with stated probabilities and payoffs). Modal choices were used to identify
    systematic violations of expected utility theory. The prospect theory model (editing
    + evaluation phases) was then proposed to explain these patterns.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
