subject_ref: art:paper
title: 'Prospect Theory: An Analysis of Decision under Risk'
summary: 'Agent-facing sidecar for Kahneman & Tversky''s 1979 Econometrica paper on
  prospect theory. Covers the reference-dependent value function, loss aversion (losses
  loom ~2x larger than gains), probability weighting (overweighting small probabilities,
  underweighting large ones), and the S-shaped value function (concave for gains,
  convex for losses). Evidence is from survey/choice experiments with hypothetical
  gambles.

  '
