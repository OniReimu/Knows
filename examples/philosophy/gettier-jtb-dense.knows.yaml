statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Justified true belief is NOT sufficient for knowledge. The classical JTB
    analysis -- S knows that P if and only if (i) P is true, (ii) S believes that P,
    and (iii) S is justified in believing that P -- is shown to be inadequate by counterexample.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: page_range
    locator: 121-123
    quote: I shall argue that the conditions stated therein do not constitute a sufficient
      condition for the truth of the proposition that S knows that P
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Case I demonstrates JTB without knowledge: Smith has justified belief that
    "the man who will get the job has ten coins in his pocket" (based on strong evidence
    about Jones), and this belief is true (because Smith himself, who unexpectedly
    gets the job, happens to have ten coins). Smith has justified true belief, yet
    does not know it, because the truth-maker is entirely different from the justification-maker.

    '
  about_ref: art:paper
  status: asserted
