subject_ref: art:paper
title: Is Justified True Belief Knowledge?
summary: 'Dense agent-facing sidecar for Gettier''s 1963 Analysis paper. In three pages
  with two thought-experiment counterexamples, Gettier refutes the classical analysis
  of knowledge as justified true belief (JTB), which had stood since Plato''s Theaetetus.
  No data, no experiments -- just two devastating cases showing that a person can have
  a justified true belief that is clearly not knowledge. This paper launched 60+ years
  of epistemological debate. This dense variant provides fine-grained coverage of every
  argument step, counterexample detail, and assumption.

  '
