- id: ev:case-ii
  evidence_type: case_study
  summary: 'Case II (the Ford-or-Barcelona case): Smith has strong evidence that Jones
    owns a Ford. Smith constructs the disjunction "either Jones owns a Ford or Brown
    is in Barcelona" (for arbitrary Brown and location). By closure, this disjunction
    is justified. It turns out Jones does NOT own a Ford (he is driving a rented car),
    but Brown happens to be in Barcelona, making the disjunction true. Smith has justified
    true belief but lacks knowledge -- the justificatory leg (Jones''s Ford) is false,
    and the truth-making leg (Brown in Barcelona) is unjustified.

    '
