    qualitative_value: Yes -- strong evidence that Jones will get the job + Jones has
      ten coins
  - metric: 'true'
    qualitative_value: Yes -- the man who gets the job (Smith) does have ten coins
  - metric: believed
    qualitative_value: Yes -- Smith believes the proposition based on his evidence
  - metric: knowledge
    qualitative_value: No -- the truth-maker (Smith's coins) is entirely disconnected
      from the justification (Jones's coins)
  - metric: evidence_source
    qualitative_value: Company president assured Smith that Jones would be selected;
