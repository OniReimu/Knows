evidence:
- id: ev:case-i
  evidence_type: case_study
  summary: 'Case I (the ten-coins case): Smith and Jones have applied for a job. Smith
    has strong evidence that (a) Jones will get the job, and (b) Jones has ten coins
    in his pocket. Smith infers "the man who will get the job has ten coins in his
    pocket." Unknown to Smith, he himself will get the job, and he himself has ten
    coins. All JTB conditions are met, but Smith does not know the proposition -- his
    justification traces through the false belief that Jones will get the job.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: page_range
    locator: '122'
