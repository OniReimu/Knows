evidence:
- id: ev:imitation-game
  evidence_type: case_study
  summary: 'The imitation game thought experiment: three players (man A, woman B,
    interrogator C) communicate via text. A tries to deceive C; B tries to help C.
    Turing then asks what happens when a machine replaces A. The test is operational
    — it defines "thinking" in terms of indistinguishable conversational behaviour,
    sidestepping metaphysical debates about consciousness. Sample Q&A exchanges (sonnet
    writing, arithmetic with deliberate errors, chess endgame) illustrate how the
    test covers diverse intellectual capacities.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Sections 1-2
  observations:
  - metric: test_structure
    qualitative_value: Three-player text-only protocol; machine replaces man's role
  - metric: evaluation_criterion
    qualitative_value: Frequency of correct identification by interrogator
  - metric: scope
    qualitative_value: Covers any intellectual field expressible via text Q&A
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:nine-objections
  evidence_type: case_study
  summary: 'Turing systematically enumerates and rebuts nine objections to machine
    thinking: (1) Theological — God gave souls only to humans, but omnipotence should
    not be so constrained; (2) Heads in the Sand — emotional denial, not argument;
    (3) Mathematical (Gödel) — machines have limitations, but so do humans; (4) Consciousness
    (Jefferson) — extreme form leads to solipsism; (5) Various Disabilities — "machines
    can''t do X" rests on induction from limited experience; (6) Lady Lovelace — machines
    can only do what we tell them, but this underestimates what programming can achieve;
    (7) Continuity of the Nervous System — a discrete machine can approximate continuous
    behaviour to within the interrogator''s detection threshold; (8) Informality of
    Behaviour — confuses rules of conduct with laws of behaviour; (9) ESP — the strongest
    objection in Turing''s view, solvable by telepathy-proof rooms.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 6, nine numbered subsections
  observations:
  - metric: objections_addressed
    qualitative_value: 9 distinct objections, each with explicit rebuttal
  - metric: strongest_concession
    qualitative_value: Turing concedes the ESP argument is 'quite a strong one'
  - metric: weakest_objection
    qualitative_value: Heads in the Sand dismissed as not requiring refutation
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:learning-machine
  evidence_type: case_study
  summary: 'Turing proposes a constructive programme: build a child-machine with minimal
    initial structure (like a blank notebook), then educate it using punishments,
    rewards, and symbolic language instruction. He draws an analogy between machine
    learning and evolution — structure of the child machine corresponds to hereditary
    material, changes correspond to mutations, and the experimenter''s judgment corresponds
    to natural selection — but notes that intelligent experimentation can outpace
    blind evolution. He also suggests including a random element to aid search and
    mentions his own preliminary experiments with a simple child-machine.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 7, Learning Machines
  observations:
  - metric: analogy
    qualitative_value: Child-machine education analogized to biological evolution
      with intelligent selection
  - metric: mechanism
    qualitative_value: Punishments decrease probability of preceding events; rewards
      increase it
  - metric: practical_note
    qualitative_value: Turing reports conducting preliminary experiments with a simple
      child-machine
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:universality-argument
  evidence_type: case_study
  summary: 'Turing explains that digital computers are universal machines — they can
    mimic any discrete-state machine given adequate storage and speed. He illustrates
    discrete-state machines with a simple 3-state clicking wheel, notes the Manchester
    computer has ~2^165,000 states (~10^50,000), and argues that universality means
    "it is unnecessary to design various new machines to do various computing processes.
    They can all be done with one digital computer, suitably programmed." This collapses
    the question from "are there imaginable computers that would pass?" to "can one
    specific computer C, with enough resources and the right programme, pass?"

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 5, Universality of Digital Computers
  observations:
  - metric: key_consequence
    qualitative_value: All digital computers are in a sense equivalent — only the
      programme matters
  - metric: storage_example
    qualitative_value: 'Manchester machine: ~165,000 bits storage capacity'
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:sonnet-viva-voce
  evidence_type: case_study
  summary: 'In rebutting the Argument from Consciousness, Turing constructs a viva
    voce dialogue about a Shakespeare sonnet. A witness discusses why "a spring day"
    would not scan in place of "a summer''s day," why "a winter''s day" carries the
    wrong connotation, and how Mr. Pickwick relates to Christmas. Turing argues that
    if a machine sustained this quality of literary conversation, even Jefferson would
    not call it "an easy contrivance." The example demonstrates that the imitation
    game can probe aesthetic and interpretive understanding, not just factual recall.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 6, Objection 4 (Argument from Consciousness)
  observations:
  - metric: dialogue_quality
    qualitative_value: Multi-turn literary analysis requiring aesthetic judgment and
      contextual reasoning
  - metric: rhetorical_purpose
    qualitative_value: Demonstrates the imitation game can test for subjective understanding,
      countering Jefferson
