- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The imitation game tests only text-based conversational behaviour over a
    short window (five minutes). It deliberately excludes physical appearance, sensory
    experience, embodiment, and emotional qualia. Critics (e.g., Searle''s later Chinese
    Room argument) argue that passing the test demonstrates linguistic mimicry rather
    than genuine understanding.

    '
