- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'Turing predicts that in about fifty years (by ~2000), computers with ~10^9
    bits of storage will play the imitation game well enough that an average interrogator
    will have no more than a 70% chance of correct identification after five minutes
    of questioning. He further predicts that by century''s end the phrase "machines
    thinking" will be common parlance.

    '
