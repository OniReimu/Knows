title: Computing Machinery and Intelligence
summary: 'Agent-facing sidecar for Turing''s 1950 Mind paper. Turing replaces the
  vague question "Can machines think?" with a precise operational test — the imitation
  game (now called the Turing Test) — in which a human interrogator communicates via
  text with a hidden machine and a hidden human and tries to tell which is which.
  Turing restricts "machines" to digital computers, invokes the universality property
  to argue that a single suitably programmed computer suffices, then catalogues and
  rebuts nine contrary objections (theological, mathematical, consciousness, Lady
  Lovelace''s, etc.). He predicts that by the year 2000 a computer with ~10^9 bits
  of storage will fool an average interrogator 30% of the time in a five-minute session.
  The paper closes with a constructive proposal: instead of programming an adult mind
  directly, build a child-machine and educate it through rewards, punishments, and
  symbolic instruction — an early sketch of machine learning.

  '
