statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'The question "Can machines think?" should be replaced by the imitation game:
    a human interrogator communicates via text with a hidden machine and a hidden
    human, then tries to determine which is which. If the machine fools the interrogator
    as often as a human would, the machine should be credited with thinking. This
    operational substitution avoids the definitional morass around "machine" and "think".

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 1, The Imitation Game
    quote: We now ask the question, 'What will happen when a machine takes the part
      of A in this game?' Will the interrogator decide wrongly as often when the game
      is played like this as he does when the game is played between a man and a woman?
      These questions replace our original, 'Can machines think?'
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Digital computers are universal machines: any discrete-state machine can
    be mimicked by a suitably programmed digital computer with adequate storage and
    speed. Therefore the question reduces to whether one particular digital computer
    C, given enough storage and an appropriate programme, can play the imitation game
    satisfactorily.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 5, Universality of Digital Computers
    quote: This special property of digital computers, that they can mimic any discrete
      state machine, is described by saying that they are universal machines.
  confidence:
    claim_strength: high
    extraction_fidelity: high
