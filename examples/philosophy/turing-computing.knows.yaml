  text: 'Turing''s method is philosophical argumentation by operational reformulation
    plus systematic objection-and-rebuttal. He replaces an ill-defined question with
    a precise behavioural test, restricts the machine class, establishes universality,
    then enumerates and answers nine objections. No experiments or formal proofs are
    presented — evidence consists entirely of thought experiments, logical arguments,
    and analogies.

