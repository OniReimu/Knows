- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'All nine contrary objections to machine thinking can be answered. Turing
    addresses: (1) The Theological Objection, (2) Heads in the Sand, (3) The Mathematical
    Objection (Gödel), (4) The Argument from Consciousness (Jefferson), (5) Arguments
    from Various Disabilities, (6) Lady Lovelace''s Objection, (7) Argument from Continuity
    in the Nervous System, (8) The Argument from Informality of Behaviour, and (9)
    The Argument from Extra-Sensory Perception. None is conclusive against the possibility
    of machine thought.

    '
