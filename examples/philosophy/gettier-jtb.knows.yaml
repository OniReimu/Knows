abstract: Various attempts have been made in recent years to state necessary and sufficient
  conditions for someone's knowing a given proposition. I shall argue that the conditions
  stated therein do not constitute a sufficient condition for the truth of the proposition
  that S knows that P, by presenting two cases in which the conditions are met but
  which are not cases of knowledge.
