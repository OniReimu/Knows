evidence:
- id: ev:case-i
  evidence_type: case_study
  summary: 'Case I (the ten-coins case): Smith and Jones have applied for a job. Smith
    has strong evidence that (a) Jones will get the job, and (b) Jones has ten coins
    in his pocket. Smith infers "the man who will get the job has ten coins in his
    pocket." Unknown to Smith, he himself will get the job, and he himself has ten
    coins. All JTB conditions are met, but Smith does not know the proposition — his
    justification traces through the false belief that Jones will get the job.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: '122'
  observations:
  - metric: justified
    qualitative_value: Yes — strong evidence that Jones will get the job + Jones has
      ten coins
  - metric: 'true'
    qualitative_value: Yes — the man who gets the job (Smith) does have ten coins
  - metric: believed
    qualitative_value: Yes — Smith believes the proposition based on his evidence
  - metric: knowledge
    qualitative_value: No — the truth-maker (Smith's coins) is entirely disconnected
      from the justification (Jones's coins)
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:case-ii
  evidence_type: case_study
  summary: 'Case II (the Ford-or-Barcelona case): Smith has strong evidence that Jones
    owns a Ford. Smith constructs the disjunction "either Jones owns a Ford or Brown
    is in Barcelona" (for arbitrary Brown and location). By closure, this disjunction
    is justified. It turns out Jones does NOT own a Ford, but Brown happens to be
    in Barcelona, making the disjunction true. Smith has justified true belief but
    lacks knowledge — the justificatory leg (Jones''s Ford) is false, and the truth-making
    leg (Brown in Barcelona) is unjustified.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 122-123
  observations:
  - metric: justified
    qualitative_value: Yes — justified belief in Jones owning a Ford, extended by
      entailment to the disjunction
  - metric: 'true'
    qualitative_value: Yes — Brown is (by coincidence) in Barcelona, making the disjunction
      true
  - metric: believed
    qualitative_value: Yes — Smith believes the disjunction on the basis of his evidence
      about Jones
  - metric: knowledge
    qualitative_value: No — the true disjunct (Brown in Barcelona) plays no role in
      Smith's justification
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:structural-pattern
  evidence_type: case_study
  summary: 'Both cases share the same logical structure (the "Gettier recipe"): (1)
    S is justified in believing a false proposition P; (2) S deduces or infers Q from
    P (closure); (3) Q happens to be true for reasons unrelated to P. This recipe
    generates indefinitely many Gettier cases, showing the problem is systematic,
    not ad hoc.

    '
  source_anchors:
  - representation_ref: rep:pdf
    locator_type: page_range
    locator: 121-123
  observations:
  - metric: common_structure
    qualitative_value: Justified false belief serves as inferential basis for a proposition
      that is accidentally true
  - metric: generalizability
    qualitative_value: The recipe produces unboundedly many counterexamples — the
      refutation is not case-specific
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
