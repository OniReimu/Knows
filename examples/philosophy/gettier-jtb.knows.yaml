- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'Case II demonstrates JTB without knowledge: Smith has justified belief that
    "either Jones owns a Ford or Brown is in Barcelona." The disjunction is true only
    because Brown happens to be in Barcelona (unknown to Smith), while Jones (the
    justificatory basis) does not actually own a Ford. Again, justified true belief
