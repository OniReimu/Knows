- id: ev:sonnet-viva-voce
  evidence_type: case_study
  summary: 'In rebutting the Argument from Consciousness, Turing constructs a viva
    voce dialogue about Shakespeare''s sonnet "Shall I compare thee to a summer''s
    day." The witness explains why "a spring day" would not scan, why "a winter''s
    day" carries the wrong connotation (nobody wants to be compared to one), and how
    Mr. Pickwick relates to Christmas. The dialogue demonstrates multi-turn aesthetic
    and contextual reasoning.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 6, Objection 4
  observations:
