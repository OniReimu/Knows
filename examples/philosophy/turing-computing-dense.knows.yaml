- id: stmt:c11
  statement_type: claim
  modality: theoretical
  text: 'Objection 6 (Lady Lovelace): Lady Lovelace stated "The Analytical Engine
    has no pretensions to originate anything. It can do whatever we know how to order
    it to perform." Turing''s immediate rebuttal: the Analytical Engine was a universal
    digital computer, so with adequate storage and speed it could mimic any discrete-state
    machine. Lovelace lacked the evidence to see this. Turing also notes machines
    frequently surprise him because he does not do sufficient calculation to predict
    their behaviour. The fuller rebuttal is deferred to Section 7 (learning machines).

    '
  about_ref: art:paper
