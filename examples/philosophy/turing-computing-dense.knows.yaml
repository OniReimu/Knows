- id: ev:nine-objections
  evidence_type: case_study
  summary: 'Turing systematically enumerates and rebuts nine objections to machine
    thinking: (1) Theological -- restricts God''s omnipotence; (2) Heads in the Sand
    -- emotional denial; (3) Mathematical (Godel) -- machines have limitations but
    so do humans; (4) Consciousness (Jefferson) -- extreme form leads to solipsism;
    (5) Various Disabilities -- rests on induction from limited experience; (6) Lady
    Lovelace -- underestimates what programming can achieve; (7) Continuity of Nervous
    System -- discrete can approximate continuous; (8) Informality of Behaviour --
    confuses rules of conduct with laws of behaviour; (9) ESP -- the strongest objection,
    solvable by telepathy-proof rooms.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 6, nine numbered subsections
  observations:
  - metric: objections_addressed
    qualitative_value: 9 distinct objections, each with explicit rebuttal
  - metric: strongest_concession
    qualitative_value: Turing concedes the ESP argument is 'quite a strong one'
  - metric: weakest_objection
    qualitative_value: Heads in the Sand dismissed as not requiring refutation
  provenance:
