- id: ev:programming-estimate
  evidence_type: case_study
  summary: 'Turing estimates his own programming rate at about 1000 digits of programme
    per day, so about sixty workers working steadily through fifty years might produce
    enough programme to simulate an adult mind -- if nothing went into the waste-paper
    basket. This motivates the child-machine approach as a more expeditious method.

    '
