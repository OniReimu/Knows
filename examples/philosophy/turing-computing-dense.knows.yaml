- id: stmt:c20
  statement_type: claim
  modality: theoretical
  text: 'Turing estimates brain storage capacity at 10^10 to 10^15 binary digits,
    inclines to the lower values, and believes only a small fraction is used for higher
    thinking (most for visual impressions). He estimates 10^9 bits would suffice for
    satisfactory play of the imitation game, at least against a blind man. He notes
    that the capacity of the Encyclopaedia Britannica (11th edition) is 2 x 10^9 bits.

    '
