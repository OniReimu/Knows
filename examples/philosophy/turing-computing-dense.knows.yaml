- id: stmt:c12
  statement_type: claim
  modality: theoretical
  text: 'Objection 7 (Continuity of the Nervous System): The nervous system is not
    a discrete-state machine -- small errors in neural signals can produce large effects.
    Turing rebuts this by noting that a discrete digital computer can approximate continuous
    behaviour to within the interrogator''s detection threshold. He illustrates with
    a differential analyser example: a digital computer could give the "right sort of
    answer" (e.g., approximate pi values) that the interrogator cannot distinguish
    from the continuous machine.

    '
  about_ref: art:paper
