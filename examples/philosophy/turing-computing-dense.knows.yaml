- id: ev:digital-computer-components
  evidence_type: case_study
  summary: 'Turing describes a digital computer as having three parts: (i) Store --
    information storage corresponding to the human computer''s paper; (ii) Executive
    unit -- performs individual operations; (iii) Control -- ensures instructions obeyed
    in correct order. He explains instruction coding, conditional branching ("if position
    4505 contains 0 obey next the instruction stored in 6707"), and the domestic analogy
    of Tommy and the cobbler to illustrate loops.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 4, Digital Computers
  observations:
  - metric: store_analogy
    qualitative_value: Corresponds to paper (calculation sheets + rule book) and memory
  - metric: executive_analogy
    qualitative_value: Carries out individual calculation operations
  - metric: control_analogy
    qualitative_value: Corresponds to the human following the book of rules
  - metric: programming_definition
    qualitative_value: Constructing instruction tables is called programming
