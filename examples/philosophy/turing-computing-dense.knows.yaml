- id: stmt:c8
  statement_type: claim
  modality: theoretical
  text: 'Objection 3 (Mathematical / Godel): Godel''s theorem shows that any sufficiently
    powerful discrete-state machine has limitations -- questions it will answer wrongly
    or fail to answer. Turing''s key counter-argument: it has only been stated, without
    any sort of proof, that no such limitations apply to the human intellect. Humans
    also give wrong answers frequently. Moreover, superiority over one particular machine
    does not imply superiority over all machines -- there might always be cleverer ones.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
