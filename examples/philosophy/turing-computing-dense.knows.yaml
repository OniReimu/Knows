    qualitative_value: Three-player text-only protocol; machine replaces man's role
  - metric: evaluation_criterion
    qualitative_value: Frequency of correct identification by interrogator
  - metric: scope
    qualitative_value: Covers any intellectual field expressible via text Q&A
  - metric: communication_medium
    qualitative_value: Typewritten messages to exclude voice cues
