evidence:
- id: ev:imitation-game
  evidence_type: case_study
  summary: 'The imitation game thought experiment: three players (man A, woman B,
    interrogator C) communicate via text. A tries to deceive C; B tries to help C.
    Turing then asks what happens when a machine replaces A. The test is operational
    -- it defines "thinking" in terms of indistinguishable conversational behaviour,
    sidestepping metaphysical debates about consciousness. Sample Q&A exchanges (sonnet
    writing, arithmetic with deliberate errors, chess endgame) illustrate how the
    test covers diverse intellectual capacities.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Sections 1-2
  observations:
