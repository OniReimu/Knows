  statement_type: claim
  modality: theoretical
  text: 'Objection 1 (Theological): Thinking is a function of the immortal soul given
    only to humans. Turing rebuts this by arguing it restricts God''s omnipotence --
    God could confer a soul on a machine if He chose, just as He could on an elephant
    with an improved brain. Furthermore, theological arguments have historically been
    unreliable (e.g., biblical arguments against Copernican theory).

    '
