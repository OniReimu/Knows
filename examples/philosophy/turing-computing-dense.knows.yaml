- id: ev:universality-argument
  evidence_type: case_study
  summary: 'Turing explains that digital computers are universal machines -- they can
    mimic any discrete-state machine given adequate storage and speed. He illustrates
    discrete-state machines with a simple 3-state clicking wheel, notes the Manchester
    computer has ~2^165,000 states (~10^50,000), and argues that universality means
    all digital computers are in a sense equivalent -- only the programme matters.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 5, Universality of Digital Computers
  observations:
