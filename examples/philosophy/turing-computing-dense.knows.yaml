- id: stmt:c5
  statement_type: claim
  modality: theoretical
  text: 'Instead of directly programming an adult mind, one should construct a child-machine
    with minimal built-in mechanism and then educate it through punishments, rewards,
    and symbolic instruction -- producing the adult mind via a learning process analogous
    to human child development. This is more practical than hand-coding sixty workers''
    worth of programme over fifty years.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 7, Learning Machines
    quote: Instead of trying to produce a programme to simulate the adult mind, why
      not rather try to produce one which simulates the child's? If this were then
      subjected to an appropriate course of education one would obtain the adult brain.
  confidence:
