- id: stmt:c13
  statement_type: claim
  modality: theoretical
  text: 'Objection 8 (Informality of Behaviour): It is impossible to produce rules
    of conduct covering every conceivable circumstance, so men cannot be machines.
    Turing identifies the undistributed middle in this argument and distinguishes between
    "rules of conduct" (conscious precepts like "stop at red lights") and "laws of
    behaviour" (natural laws governing the body). He demonstrates with a Manchester
    computer program using only 1000 storage units that produces unpredictable outputs
    -- one cannot learn enough from its replies to predict untried values.

    '
  about_ref: art:paper
