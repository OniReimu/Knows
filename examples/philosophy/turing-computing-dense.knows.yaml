- id: stmt:c9
  statement_type: claim
  modality: theoretical
  text: 'Objection 4 (Consciousness / Jefferson): Jefferson argues that a machine
    cannot truly think unless it feels emotions, knows that it has written a sonnet,
    etc. Turing replies that the extreme form of this view leads to solipsism -- the
    only way to know anyone thinks is to be that person. He uses a viva voce dialogue
    about Shakespeare''s sonnet ("Shall I compare thee to a summer''s day") to show
    the imitation game can probe aesthetic understanding. If a machine sustained such
    literary conversation, even Jefferson would not call it "an easy contrivance."

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 6, Objection 4
  confidence:
    claim_strength: high
