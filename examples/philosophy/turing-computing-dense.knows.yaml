- id: stmt:c15
  statement_type: claim
  modality: theoretical
  text: 'A digital computer consists of three parts: (i) Store -- corresponds to the
    human computer''s paper (calculation paper and book of rules), and partly to memory
    for calculations done in the head; (ii) Executive unit -- carries out individual
    operations involved in a calculation; (iii) Control -- ensures instructions are
    obeyed correctly and in the right order, corresponding to the human following the
    book of rules. The "book of rules" is replaced by the "table of instructions"
    stored in the store, and constructing these tables is called "programming."

    '
