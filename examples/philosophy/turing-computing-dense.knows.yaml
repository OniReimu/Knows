- id: ev:babbage-historical
  evidence_type: citation_backed
  summary: 'Turing notes that Charles Babbage planned the Analytical Engine (a digital
    computer) in the 1830s but never completed it. Its speed would have been about
    100 times slower than the Manchester machine. The fact that Babbage''s machine
    was purely mechanical (not electrical) helps dispel the superstition that electricity
    is theoretically important -- since all digital computers are equivalent, the use
    of electricity is a superficial similarity between computers and the nervous system.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 4, Digital Computers
  observations:
  - metric: babbage_speed
    qualitative_value: About 100 times slower than the Manchester machine
  - metric: electricity_point
