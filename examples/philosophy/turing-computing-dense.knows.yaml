- id: ev:learning-machine
  evidence_type: case_study
  summary: 'Turing proposes a constructive programme: build a child-machine with minimal
    initial structure (like a blank notebook), then educate it using punishments,
    rewards, and symbolic language instruction. He draws an analogy between machine
    learning and evolution (structure = heredity, changes = mutations, experimenter
    = selection). He notes that intelligent experimentation can outpace blind evolution,
    suggests including a random element to aid search, and mentions his own preliminary
    experiments with a simple child-machine.

    '
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: Section 7, Learning Machines
  observations:
