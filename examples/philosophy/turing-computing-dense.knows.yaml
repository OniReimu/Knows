abstract: I propose to consider the question, "Can machines think?" This should begin
  with definitions of the meaning of the terms "machine" and "think". The definitions
  might be framed so as to reflect so far as possible the normal use of the words,
  but this attitude is dangerous. Instead of attempting such a definition I shall
  replace the question by another, which is closely related to it and is expressed
  in relatively unambiguous words.
