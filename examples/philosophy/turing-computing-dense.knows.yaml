- id: stmt:c10
  statement_type: claim
  modality: theoretical
  text: 'Objection 5 (Various Disabilities): Critics claim machines can never do X
    (be kind, have a sense of humour, fall in love, learn from experience, etc.).
    Turing argues these claims are founded on scientific induction from limited experience
    with existing machines, and that machines with large storage capacity have not yet
    been observed. The variety of behaviour possible is related to storage capacity.

    '
  about_ref: art:paper
