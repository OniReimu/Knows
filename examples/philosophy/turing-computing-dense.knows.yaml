- id: stmt:c14
  statement_type: claim
  modality: theoretical
  text: 'Objection 9 (Extra-Sensory Perception): Turing considers this "quite a strong
    one" -- the strongest objection in his view. If telepathy exists, an interrogator
    using a telepathic human witness could outperform the machine. Turing''s solution:
    put the competitors in a "telepathy-proof room." He also suggests that a random
    number generator in the machine might be subject to psychokinetic influence, potentially
    helping the machine guess right.

