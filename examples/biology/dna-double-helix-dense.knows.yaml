      type: org
    generated_at: '2026-03-27T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'The bases are on the inside of the helix, with the phosphate-sugar backbone
    on the outside. Bases pair specifically: adenine (a purine) with thymine (a pyrimidine),
    and guanine (a purine) with cytosine (a pyrimidine), joined by hydrogen bonds.
    One member of each pair must be a purine and the other a pyrimidine for bonding
    to occur.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
