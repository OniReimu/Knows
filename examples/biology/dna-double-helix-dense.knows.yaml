statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'DNA has a structure of two helical chains wound around the same axis to form
    a right-handed double helix. The two chains run in opposite directions (antiparallel).
    Both chains follow right-handed helices, but owing to the dyad perpendicular to
    the fibre axis, the sequences of atoms in the two chains run in opposite directions.

    '
  about_ref: art:paper
  status: asserted
