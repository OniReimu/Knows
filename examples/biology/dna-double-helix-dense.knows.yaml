summary: 'Dense agent-facing sidecar for Watson & Crick''s 1953 Nature paper proposing
  the double helix structure of DNA. This dense variant provides fine-grained coverage
  of all structural dimensions, specific base-pairing rules with chemical constraints,
  the tautomeric form argument, Chargaff''s ratios, X-ray diffraction evidence details,
  the ribose exclusion argument, refutation of the Pauling-Corey model, the replication
  hint, and stereochemical constraints.

  '
