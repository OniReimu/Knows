  statement_type: claim
  modality: theoretical
  text: 'The specific base-pairing is constrained by tautomeric form: if bases occur
    only in their most plausible tautomeric forms (keto rather than enol configurations),
    then only specific pairs can bond together. These pairs are adenine with thymine,
    and guanine with cytosine. No other combinations are stereochemically possible
    under the keto assumption.

    '
