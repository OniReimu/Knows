abstract: We wish to suggest a structure for the salt of deoxyribose nucleic acid
  (D.N.A.). This structure has novel features which are of considerable biological
  interest. A structure for nucleic acid has already been proposed by Pauling and
  Corey. They kindly made their manuscript available to us in advance of publication.
  Their model consists of three intertwined chains, with the phosphates near the fibre
  axis, and the bases on the outside. In our opinion, this structure is unsatisfactory.
