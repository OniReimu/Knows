- id: ev:chargaff-rule
  evidence_type: citation_backed
  summary: 'Chargaff''s rules establish that in DNA, the amount of adenine equals
    thymine, and guanine equals cytosine (A=T, G=C). This stoichiometric constraint
    is satisfied by the proposed base pairing scheme.

    '
  source_anchors:
