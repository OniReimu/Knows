- id: stmt:m2
  statement_type: method
  modality: descriptive
  text: 'Artificial fertilization procedure: the bud is opened before fully developed,
    the keel removed, each stamen carefully extracted by forceps, then the stigma
    dusted with foreign pollen. Pot plants were placed in a greenhouse during blooming
    as controls against insect disturbance.

    '
