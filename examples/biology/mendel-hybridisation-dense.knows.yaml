- id: stmt:c6
  statement_type: claim
  modality: empirical
  text: 'The seven differentiating characters and their dominant forms are: (1) Seed
    form -- round/roundish (dominant) vs angular wrinkled; (2) Albumen color -- yellow
    (dominant) vs green; (3) Seed-coat color -- gray/gray-brown/leather-brown with
    violet-red flowers (dominant) vs white seed-coat with white flowers; (4) Pod form
    -- simply inflated (dominant) vs deeply constricted; (5) Unripe pod color -- green
    (dominant) vs yellow; (6) Flower position -- axial along stem (dominant) vs terminal;
    (7) Stem length -- long, 6-7 ft (dominant) vs short, 3/4 to 1.5 ft.

    '
