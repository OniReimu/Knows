title: Experiments on Plant Hybridisation (Versuche uber Pflanzenhybriden)
summary: 'Dense agent-facing sidecar for Gregor Mendel''s 1866 paper reporting eight
  years of systematic crossing experiments with Pisum sativum (garden peas). This dense
  variant provides fine-grained coverage of all seven differentiating characters with
  their dominant forms, individual F2 ratios for each experiment, F3 genotypic ratios,
  dihybrid and trihybrid cross results, backcross validation, the number of fertilizations
  per experiment, precautions against contamination, and the reproductive cell hypothesis.

  '
