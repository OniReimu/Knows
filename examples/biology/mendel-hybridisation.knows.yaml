      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: empirical
  text: 'Of F2 individuals showing the dominant character, one-third breed true (constant)
    and two-thirds are hybrids that again segregate 3:1 in the next generation. The
    F2 genotypic ratio is therefore 1:2:1 (homozygous dominant : heterozygous : homozygous
    recessive), which Mendel expresses as A + 2Aa + a.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: THE SECOND GENERATION FROM THE HYBRIDS
    quote: of those forms which possess the dominant character in the first generation,
      two-thirds have the hybrid-character, while one-third remains constant with
      the dominant character
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: empirical
  text: 'When two or more differentiating characters are combined in a hybrid, each
    pair of characters segregates independently. The offspring form the terms of a
    combination series (e.g., 9:3:3:1 for a dihybrid cross). For n differentiating
    characters, 3^n phenotypic classes, 4^n individuals, and 2^n constant forms result.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: THE OFFSPRING OF HYBRIDS IN WHICH SEVERAL DIFFERENTIATING CHARACTERS
      ARE ASSOCIATED
    quote: the relation of each pair of different characters in hybrid union is independent
      of the other differences in the two original parental stocks
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'Hybrids produce egg and pollen cells that represent, in equal numbers, all
    constant combination forms possible from the united characters. The observed segregation
    ratios can be explained by the random union of these equally frequent reproductive
    cells.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
