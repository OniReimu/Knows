title: Experiments on Plant Hybridisation (Versuche über Pflanzenhybriden)
summary: 'Agent-facing sidecar for Gregor Mendel''s 1866 paper reporting eight years
  of systematic crossing experiments with Pisum sativum (garden peas). The paper establishes
  the 3:1 segregation ratio for seven differentiating characters, introduces the concepts
  of dominant and recessive traits, derives the 1:2:1 genotypic ratio in F2, and demonstrates
  that characters assort independently when multiple traits are crossed simultaneously.
  These results later became known as Mendel''s First Law (Law of Segregation) and
  Second Law (Law of Independent Assortment).

  '
