statements:
- id: stmt:c1
  statement_type: claim
  modality: empirical
  text: 'In the first hybrid generation (F2), dominant and recessive characters reappear
    in a definite average proportion of 3:1. Among each four plants of this generation
    three display the dominant character and one the recessive. The overall average
    across all seven experiments was 2.98:1.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: THE FIRST GENERATION FROM THE HYBRIDS
    quote: the definitely expressed average proportion of three to one, so that among
      each four plants of this generation three display the dominant character and
      one the recessive
  confidence:
