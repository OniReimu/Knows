    locator_type: section
    locator: THE REPRODUCTIVE CELLS OF THE HYBRIDS
    quote: the pea hybrids form egg and pollen cells which, in their constitution,
      represent in equal numbers all constant forms which result from the combination
      of the characters united in fertilization
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Mendel selected Pisum sativum (garden peas) for their self-fertilizing floral
    structure, short generation time, and availability of constant differentiating
    varieties. 34 varieties were obtained and tested over two years; 22 were selected
    for the experiments. Seven binary differentiating characters were identified covering
    seed form, seed color, seed-coat color, pod form, pod color, flower position,
    and stem length. Reciprocal crosses were performed for each character pair, with
    60 to 23 fertilizations per experiment across 5 to 15 plants.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: SELECTION OF THE EXPERIMENTAL PLANTS
    quote: In all, thirty-four more or less distinct varieties of Peas were obtained
      from several seedsmen and subjected to a two year's trial
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'The experiments assume that foreign pollen contamination was negligible due
    to the self-fertilizing structure of pea flowers (anthers burst within the bud
    before the flower opens). Among more than 10,000 plants examined, only very few
    cases of indubitable false impregnation were observed.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: SELECTION OF THE EXPERIMENTAL PLANTS
    quote: The risk of false impregnation by foreign pollen is, however, a very slight
      one with Pisum, and is quite incapable of disturbing the general result
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The experiments were practically confined to a single plant group (Pisum).
    Mendel acknowledges that confirmation from other species is needed. Experiments
    with Phaseolus multiflorus showed reduced fertility and complex color inheritance
    that did not straightforwardly follow the simple ratios observed in Pisum.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: EXPERIMENTS WITH HYBRIDS OF OTHER SPECIES OF PLANTS
    quote: Whether the variable hybrids of other plant species observe an entire agreement
      must also be first decided experimentally
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c5
  statement_type: claim
  modality: empirical
  text: 'In each of the seven crosses, the hybrid resembles one parental form so closely
    that the other escapes observation. These transmitted characters are termed "dominant"
    and those that become latent are termed "recessive". It is immaterial whether
    the dominant character belongs to the seed parent or the pollen parent.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:fulltext
    locator_type: section
    locator: THE FORMS OF THE HYBRIDS
    quote: those characters which are transmitted entire, or almost unchanged in the
      hybridization, and therefore in themselves constitute the characters of the
      hybrid, are termed the dominant, and those which become latent in the process
      recessive
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
