abstract: This paper reports the results of detailed hybridization experiments with
  Pisum sativum (garden peas) conducted over eight years. Crossing varieties differing
  in seven distinct characters revealed that hybrid offspring consistently segregate
  in a 3:1 ratio of dominant to recessive forms. Among dominant F2 individuals, one-third
  breed true while two-thirds are hybrids, yielding a genotypic ratio of 1:2:1. When
  multiple characters are combined, each pair segregates independently, producing
  combination series whose terms follow predictable mathematical ratios. These regularities
  are explained by the hypothesis that hybrids form equal numbers of all possible
  gametic types.
