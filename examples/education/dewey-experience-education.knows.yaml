evidence:
- id: ev:either-or-critique
  evidence_type: observation
  summary: 'Dewey systematically contrasts the principles of traditional and progressive
    education to show that each fails by taking an extreme position. Traditional education
    is characterized by imposition from above, static subject-matter, docility, and
    preparation for the future at the expense of the present. Progressive education
    reacts by exalting individuality, free activity, learning through experience, and
    the present — but does so negatively, by rejection rather than constructive development.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 1
  observations:
  - metric: traditional_education_characteristics
    qualitative_value: 'Imposition from above and outside; adult standards imposed
      on immature learners; static subject-matter taught as finished product; docility
      and obedience expected; school sharply separated from other social institutions'
    qualifiers:
      type: critique
  - metric: progressive_education_characteristics
    qualitative_value: 'Expression and cultivation of individuality; free activity;
      learning through experience; making the most of present life; acquaintance with
      a changing world'
    qualifiers:
      type: reactive_principles
  - metric: dewey_diagnosis
    qualitative_value: 'Both are miseducative because neither applies principles of
      a carefully developed philosophy of experience. Progressive education develops
      its principles by reaction rather than constructive development.'
    qualifiers:
      type: synthesis
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:continuity-examples
  evidence_type: observation
  summary: 'Dewey illustrates the continuity principle through multiple concrete examples:
    a child learning to speak widens the external conditions of subsequent learning;
    a spoiled child develops attitudes that demand future catering to whims; a burglar
    may "grow" in skill but forecloses avenues for growth in other directions; students
    in traditional schools may acquire skills through drill that limit judgment and
    intelligent action in new situations.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapters 2-3
  observations:
  - metric: positive_continuity
    qualitative_value: 'Learning to speak opens new environment for further learning;
      curiosity and initiative carry a person over dead places in the future'
    qualifiers:
      direction: growth-promoting
  - metric: negative_continuity
    qualitative_value: 'Spoiling a child creates attitudes demanding future catering;
      drill-acquired skills limit judgment; disconnected experiences produce scatter-brained
      habits'
    qualifiers:
      direction: growth-arresting
  - metric: burglar_growth_example
    qualitative_value: 'A burglar may grow in efficiency, but this growth shuts off
      occasions for growth in other directions — fails the criterion of education as
      growing'
    qualifiers:
      direction: miseducative
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:social-control-games
  evidence_type: observation
  summary: 'Dewey uses children''s games as a paradigm case of social control without
    violation of freedom. Rules are part of the game (not imposed from outside); players
    submit willingly; disputes concern violations of rules rather than rejection of
    them. The general principle is that control of individual actions is effected by
    the whole situation in which individuals share, not by external authority.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 4
  observations:
  - metric: game_rules_principle
    qualitative_value: 'Rules are part of the game, not external impositions. No rules,
      then no game; different rules, then a different game.'
    qualifiers:
      type: social_control_paradigm
  - metric: classroom_implication
    qualitative_value: 'In progressive schools, social control resides in the nature
      of the work done as a social enterprise. The teacher reduces occasions for personal
      authority to a minimum.'
    qualifiers:
      type: application
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:purpose-formation
  evidence_type: observation
  summary: 'Dewey analyzes the formation of a genuine purpose as a complex intellectual
    operation involving three steps: (1) observation of surrounding conditions, (2)
    knowledge of what has happened in similar situations in the past (from recollection
    and wider experience), and (3) judgment that puts together observation and recollection
    to see what they signify. He illustrates with the analogy of building a house:
    desire alone is insufficient without considering funds, sites, family needs, and
    other objective facts.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 6
  observations:
  - metric: purpose_formation_steps
    qualitative_value: '(1) Observation of surrounding conditions; (2) Knowledge of
      past similar situations; (3) Judgment synthesizing observation and recollection'
    qualifiers:
      type: intellectual_operation
  - metric: purpose_vs_impulse
    qualitative_value: 'A purpose differs from impulse and desire through its translation
      into a plan and method of action based upon foresight of consequences'
    qualifiers:
      type: distinction
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: ev:scientific-method-education
  evidence_type: observation
  summary: 'Dewey argues that the scientific method — hypothesis formation, testing
    through observed consequences, and reflective summarizing — provides the only authentic
    pattern for organizing educational experience. Three features are emphasized: (1)
    ideas as hypotheses must be continuously tested, not accepted as final truths;
    (2) consequences of acting on ideas must be carefully observed; (3) reflective
    review and record-keeping of significant features enables intellectual organization.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 7
  observations:
  - metric: scientific_method_feature_1
    qualitative_value: 'Ideas are hypotheses to be continuously tested and revised,
      not fixed truths to be accepted'
    qualifiers:
      feature: hypothesis_testing
  - metric: scientific_method_feature_2
    qualitative_value: 'Consequences of action must be carefully and discriminatingly
      observed'
    qualifiers:
      feature: observation
  - metric: scientific_method_feature_3
    qualitative_value: 'Reflective review and summarizing extracts net meanings — the
      heart of intellectual organization and the disciplined mind'
    qualifiers:
      feature: reflection
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
