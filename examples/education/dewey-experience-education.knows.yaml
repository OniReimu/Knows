abstract: 'In this concise monograph, Dewey argues that both traditional and progressive
  education fail because neither applies a sound philosophy of experience. He proposes
  two foundational criteria — continuity (every experience modifies future ones) and
  interaction (experience arises from the interplay of internal and objective conditions)
  — and applies them to problems of social control, freedom, purpose formation, and
  subject-matter organization, arguing that the scientific method provides the authentic
  pattern for educative experience.'
