statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Neither traditional nor progressive education is adequate on its own. Traditional
    education imposes adult standards, subject-matter, and methods from above and outside
    the learner''s experience. Progressive education, reacting against this imposition,
    often develops its principles negatively rather than constructively — rejecting
    organization, adult guidance, and the past wholesale. Both are miseducative because
    neither applies the principles of a carefully developed philosophy of experience.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 1
    quote: neither the old nor the new education is adequate
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'The principle of continuity (the experiential continuum) holds that every
    experience both takes up something from those which have gone before and modifies
    in some way the quality of those which come after. This principle, rooted in the
    biological concept of habit, provides the primary criterion for discriminating
    between experiences that are educative and those that are miseducative. An educative
    experience is one that promotes further growth; a miseducative experience arrests
    or distorts the growth of further experience.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapters 2-3
    quote: the principle of continuity of experience means that every experience both
      takes up something from those which have gone before and modifies in some way
      the quality of those which come after
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The principle of interaction assigns equal rights to both objective (environmental)
    and internal (personal) conditions of experience. Any normal experience is an interplay
    of these two sets of conditions, together forming what Dewey calls a "situation."
    Traditional education violated this principle by overemphasizing external conditions;
    progressive education risks violating it from the opposite side by subordinating
    objective conditions to the immediate inclinations of the learner.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 3
    quote: The word "interaction" expresses the second chief principle for interpreting
      an experience in its educational function and force
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c4
  statement_type: claim
  modality: theoretical
  text: 'Continuity and interaction are not separate principles but intercept and unite
    as the longitudinal and lateral aspects of experience. Together they provide the
    measure of the educative significance and value of an experience. A fully integrated
    personality exists only when successive experiences are integrated with one another.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 3
    quote: They are, so to speak, the longitudinal and lateral aspects of experience
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c5
  statement_type: claim
  modality: theoretical
  text: 'The only freedom of enduring importance is freedom of intelligence — freedom
    of observation and of judgment exercised in behalf of purposes that are intrinsically
    worthwhile. Physical freedom of movement is a means, not an end. True self-control
    is achieved through the individual''s own reflection and judgment (inhibition of
    impulse through thinking), not through mere removal of external constraints.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 5
    quote: The only freedom that is of enduring importance is freedom of intelligence
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c6
  statement_type: claim
  modality: theoretical
  text: 'A genuine purpose is not mere impulse or desire. It requires foresight of
    consequences through intelligent observation, knowledge of the past, and judgment.
    The teacher''s guidance of the pupil''s intelligence in forming purposes is an
    aid to freedom, not a restriction upon it. Plans should be co-operative enterprises
    developed through reciprocal give-and-take, not dictations.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 6
    quote: A purpose is an end-view. That is, it involves foresight of the consequences
      which will result from acting upon impulse
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:c7
  statement_type: claim
  modality: theoretical
  text: 'Subject-matter must be derived from materials within the scope of ordinary
    life-experience and then progressively organized toward more refined, richer forms
    that approximate the knowledge of the mature specialist. The scientific method —
    forming hypotheses, testing them through observed consequences, and keeping reflective
    records — provides the authentic pattern for this progressive organization.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 7
    quote: scientific method provides a working pattern of the way in which and the
      conditions under which experiences are used to lead ever onward and outward
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-25T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'Dewey''s argumentative method proceeds by dialectical critique: he presents
    the principles and practices of traditional education, then the reactive principles
    of progressive education, and demonstrates that both fail when they operate as
    Either-Or extremes. He then constructs a positive philosophy of experience from
    two foundational criteria (continuity and interaction) and applies them to concrete
    educational problems — social control, freedom, purpose, and subject-matter organization.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Preface and Chapters 1-8
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
