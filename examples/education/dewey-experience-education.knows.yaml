title: 'Experience and Education'
summary: 'Agent-facing sidecar for John Dewey''s 1938 monograph on the philosophy of
  education grounded in experience. Documents Dewey''s critique of both traditional
  and progressive education, his two foundational principles of experience (continuity
  and interaction), his reconception of freedom as intellectual self-control rather
  than mere physical liberty, and his argument that progressive education requires
  rigorous organization of subject-matter guided by the scientific method.

  '
