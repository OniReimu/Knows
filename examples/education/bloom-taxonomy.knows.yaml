abstract: 'This handbook provides a classification of educational goals which teachers
  and examiners use in constructing curricula and examinations. The cognitive domain
  taxonomy contains six major classes: Knowledge, Comprehension, Application, Analysis,
  Synthesis, and Evaluation, ordered from simple to complex cognitive processes.'
