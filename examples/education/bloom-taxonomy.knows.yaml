- id: ev:exam-classification
  evidence_type: observation
  summary: 'The committee demonstrated the taxonomy''s applicability by classifying
    real examination questions into the six levels. Each chapter provides illustrative
    test items showing how assessment questions can target different cognitive levels
    on the same subject matter, from factual recall (Knowledge) to making judgments
    with criteria (Evaluation).

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapters 3-8
  observations:
  - metric: classification_validity
    qualitative_value: Committee members achieved consensus on classification of exam
      items into the six levels
    qualifiers:
      method: expert rating with iterative discussion
  - metric: illustrative_items
    qualitative_value: Each taxonomy level includes multiple example test items demonstrating
      that level's cognitive demand
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:anderson-revision
  evidence_type: citation_backed
  summary: 'Anderson & Krathwohl (2001) revised the original taxonomy after 45 years
    of use and critique. Key changes: (1) renamed categories from nouns to verbs (Knowledge→Remember,
    Comprehension→Understand, etc.), (2) swapped the top two levels (Create above
    Evaluate), (3) added a second dimension (Knowledge types: factual, conceptual,
    procedural, metacognitive), creating a two-dimensional taxonomy table.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: external
  observations:
  - metric: revision_scope
    qualitative_value: Six noun categories → six verb categories; added Knowledge
      dimension (4 types); Synthesis renamed Create and moved to top
    qualifiers:
      year: 2001
      authors: Anderson & Krathwohl
  - metric: hierarchy_modification
    qualitative_value: 'Original: Knowledge < Comprehension < Application < Analysis
      < Synthesis < Evaluation → Revised: Remember < Understand < Apply < Analyze
      < Evaluate < Create'
    qualifiers:
      note: Top two levels reordered
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
