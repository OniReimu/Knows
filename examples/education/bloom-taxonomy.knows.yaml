    qualitative_value: Five years of committee work (1948-1953)
    qualifiers:
      method: expert consensus
  - metric: committee_composition
    qualitative_value: College and university examiners from multiple US institutions
    qualifiers:
      leader: Benjamin S. Bloom
  - metric: data_source
    qualitative_value: Educational objectives and examination questions from US universities
    qualifiers:
      type: qualitative classification
  provenance:
