summary: 'Agent-facing sidecar for Bloom et al.''s 1956 taxonomy of cognitive learning
  objectives. Documents the six-level hierarchy (Knowledge, Comprehension, Application,
  Analysis, Synthesis, Evaluation), the expert consensus methodology, and the framework''s
  assumptions and limitations including the 2001 Anderson & Krathwohl revision.

  '
