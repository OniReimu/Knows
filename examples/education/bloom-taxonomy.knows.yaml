statements:
- id: stmt:c1
  statement_type: claim
  modality: theoretical
  text: 'Cognitive learning objectives can be systematically classified into a hierarchical
    taxonomy of six levels of increasing complexity: (1) Knowledge, (2) Comprehension,
    (3) Application, (4) Analysis, (5) Synthesis, and (6) Evaluation. Each level subsumes
    the cognitive processes of lower levels.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 2
    quote: a classification of the goals of our educational system
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c2
  statement_type: claim
  modality: theoretical
  text: 'Higher-order thinking skills (Analysis, Synthesis, Evaluation) build upon
    and require mastery of lower-order skills (Knowledge, Comprehension, Application).
    The taxonomy represents a cumulative hierarchy where each level incorporates the
    competencies of all preceding levels.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 2
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:c3
  statement_type: claim
  modality: theoretical
  text: 'The taxonomy provides a common language and framework for educators to communicate
    about educational objectives, design curricula, construct assessments, and evaluate
    whether instructional goals emphasize appropriate levels of cognitive complexity.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 1
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:m1
  statement_type: method
  modality: descriptive
  text: 'The taxonomy was developed through expert consensus among a committee of
    college and university examiners who met at the American Psychological Association
    conventions from 1948 to 1953. The committee analyzed thousands of educational
    objectives and examination questions from US universities, iteratively classifying
    them into categories and refining the hierarchical structure through multi-year
    discussion and pilot testing.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 1, Preface
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:a1
  statement_type: assumption
  modality: descriptive
  text: 'Cognitive processes are inherently hierarchical and can be meaningfully ordered
    by complexity. The taxonomy assumes a cumulative model where higher categories
    necessarily depend on mastery of lower categories — one cannot analyze without
    first knowing and comprehending. This strict ordering is a deliberate simplification
    of cognitive reality.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 2
  confidence:
    claim_strength: medium
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:l1
  statement_type: limitation
  modality: descriptive
  text: 'The original taxonomy has been criticized for its rigid hierarchy. Empirical
    studies have questioned whether the six levels form a strict cumulative sequence.
    Anderson & Krathwohl (2001) revised the taxonomy into a two-dimensional framework
    (cognitive process dimension x knowledge dimension), renamed the levels to verb
    forms (Remember, Understand, Apply, Analyze, Evaluate, Create), and reordered
    the top two levels (Synthesis/Create moved above Evaluation/Evaluate).

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 2
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: stmt:l2
  statement_type: limitation
  modality: descriptive
  text: 'The taxonomy addresses only the cognitive domain. Affective (emotions, attitudes,
    values) and psychomotor (physical skills) domains were planned as separate handbooks.
    The affective domain was published by Krathwohl, Bloom & Masia (1964); a psychomotor
    taxonomy was never completed by the original committee.

    '
  about_ref: art:paper
  status: asserted
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapter 1
  confidence:
    claim_strength: high
    extraction_fidelity: high
  provenance:
