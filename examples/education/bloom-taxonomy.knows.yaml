    generated_at: '2026-03-19T00:00:00Z'
evidence:
- id: ev:six-levels
  evidence_type: observation
  summary: 'The taxonomy defines six hierarchical levels of cognitive objectives with
    detailed sub-categories and illustrative educational objectives for each. Each
    level is characterized by specific cognitive behaviors that distinguish it from
    adjacent levels.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Chapters 3-8
  observations:
  - metric: taxonomy_level_1
    qualitative_value: Knowledge — recall of specifics, universals, methods, processes,
      patterns, structures, or settings
    qualifiers:
      level: 1
      type: lower-order
  - metric: taxonomy_level_2
    qualitative_value: Comprehension — understanding meaning; translation, interpretation,
      extrapolation
    qualifiers:
      level: 2
      type: lower-order
  - metric: taxonomy_level_3
    qualitative_value: Application — use of abstractions in particular and concrete
      situations
    qualifiers:
      level: 3
      type: lower-order
  - metric: taxonomy_level_4
    qualitative_value: Analysis — breakdown into constituent elements; relationships,
      organizational principles
    qualifiers:
      level: 4
      type: higher-order
  - metric: taxonomy_level_5
    qualitative_value: Synthesis — putting elements together to form a new whole;
      unique communication, plan, or set of abstract relations
    qualifiers:
      level: 5
      type: higher-order
  - metric: taxonomy_level_6
    qualitative_value: Evaluation — judgments about the value of material and methods
      for given purposes
    qualifiers:
      level: 6
      type: higher-order
  provenance:
    origin: author
    actor:
      name: Knows Example Authors
      type: org
    generated_at: '2026-03-19T00:00:00Z'
- id: ev:expert-consensus
  evidence_type: observation
  summary: 'The classification framework was developed over five years (1948-1953)
    by a committee of college examiners led by Benjamin Bloom. The committee reviewed
    and classified educational objectives and test items from multiple US institutions,
    using iterative rounds of categorization and inter-rater discussion to achieve
    consensus on the hierarchical structure.

    '
  source_anchors:
  - representation_ref: rep:book
    locator_type: section
    locator: Preface, Chapter 1
  observations:
